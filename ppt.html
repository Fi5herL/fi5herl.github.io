<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Party 開跑啦！</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/616/616656.png" type="image/x-icon">
    <!-- 其他 favicon links -->

    <style>
        body, html {
            margin: 0; /* 移除預設外邊距 */
            padding: 0; /* 移除內邊距，避免形成 "外框" */
            width: 100%;
            min-height: 100vh; /* 確保 body 至少是視窗高度，以便垂直居中 */
            box-sizing: border-box;
            background-color: transparent; /* 使 body 背景透明，移除 "外框" 顏色 */
            display: flex;
            justify-content: center;
            align-items: center; /* 垂直和水平居中 iframe (卡片) */
        }

        iframe {
            border: none; /* 移除 iframe 的預設邊框 */
            display: block; /* 確保 aspect-ratio 和 max-width 正常工作 */
            
            /* 寬度設定 (保持不變) */
            width: 95%; 
            max-width: 1080px;

            /* 比例設定 (保持不變) */
            aspect-ratio: 2 / 3;
            
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); /* 保留卡片陰影 */
            border-radius: 15px; /* 保留卡片圓角 */
        }

        /* 針對非常窄的螢幕 */
        @media (max-width: 400px) {
            /* body 的 padding 已在上面全局設為 0，此處無需再調整 body padding */
            iframe {
                width: 98%; /* 在極窄螢幕上更寬一點 */
                /* aspect-ratio: 9 / 16; /* 可選，如果需要在手機上改變比例 */
            }
        }
    </style>
</head>
<body>
    <iframe id="eventCardFrame" 
            src="https://script.google.com/macros/s/AKfycbxNFuVfJU5lP0dGBQBUMkPy3MDGfreuVAdiXXoQjD4CLnvwEK55uyBKGiuSm0nDKt9i/exec"
            title="PPT Party 開跑啦！🚀">
        歡迎邀約親朋好友報名喔~~
    </iframe>
</body>
</html>
