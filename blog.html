<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Milk Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f8f6f2 0%, #f5f2eb 100%);
            color: #8b7355;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 左側導航 */
        .sidebar {
            width: 280px;
            background: rgba(255, 253, 249, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(222, 216, 202, 0.3);
            padding: 2rem 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 2px 0 20px rgba(139, 115, 85, 0.1);
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar-toggle {
            position: absolute;
            top: 1rem;
            right: -15px;
            background: #f5f2eb;
            border: 2px solid #e6dcc9;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #8b7355;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: #e6dcc9;
            transform: scale(1.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #a0896b;
            margin-bottom: 2rem;
            text-align: center;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .sidebar.collapsed .logo {
            opacity: 0;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 1rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 1rem;
            color: #8b7355;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-link:hover {
            background: rgba(222, 216, 202, 0.4);
            transform: translateX(5px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, #e6dcc9, #d4c8b0);
            color: #6b5b42;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.2);
        }

        .nav-icon {
            margin-right: 0.8rem;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }

        .nav-text {
            transition: opacity 0.3s ease;
        }

        .sidebar.collapsed .nav-text {
            opacity: 0;
        }

        /* 主要內容區 */
        .main-content {
            flex: 1;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .header {
            background: rgba(255, 253, 249, 0.8);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 30px rgba(139, 115, 85, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            color: #a0896b;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .header p {
            text-align: center;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* 控制面板 */
        .controls {
            background: rgba(255, 253, 249, 0.9);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 4px 20px rgba(139, 115, 85, 0.1);
        }

        .sort-controls, .filter-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sort-controls label, .filter-controls label {
            font-weight: 600;
            color: #8b7355;
        }

        select, button {
            padding: 0.5rem 1rem;
            border: 2px solid #e6dcc9;
            border-radius: 8px;
            background: white;
            color: #8b7355;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        select:focus, button:focus {
            outline: none;
            border-color: #a0896b;
            box-shadow: 0 0 0 3px rgba(160, 137, 107, 0.2);
        }

        button {
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #f5f2eb;
            transform: translateY(-2px);
        }

        button.active {
            background: #a0896b;
            color: white;
        }

        .hashtag-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .hashtag-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 20px;
            background: #f5f2eb;
            border: 1px solid #e6dcc9;
        }

        .hashtag-btn.active {
            background: #a0896b;
            color: white;
            border-color: #a0896b;
        }

        /* 文章網格 */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .article-card {
            background: rgba(255, 253, 249, 0.9);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(139, 115, 85, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .article-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(139, 115, 85, 0.2);
        }

        .article-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .article-card:hover .article-image {
            transform: scale(1.05);
        }

        .article-content {
            padding: 1.5rem;
        }

        .article-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #8b7355;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .article-date {
            color: #a0896b;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .article-preview {
            color: #8b7355;
            opacity: 0.8;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .article-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(160, 137, 107, 0.2);
            color: #8b7355;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Markdown 渲染樣式 */
        .markdown-content {
            line-height: 1.8;
            color: #8b7355;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3, 
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            color: #a0896b;
            margin: 1.5rem 0 1rem 0;
            font-weight: bold;
        }

        .markdown-content h1 { font-size: 2rem; border-bottom: 2px solid #e6dcc9; padding-bottom: 0.5rem; }
        .markdown-content h2 { font-size: 1.7rem; }
        .markdown-content h3 { font-size: 1.4rem; }
        .markdown-content h4 { font-size: 1.2rem; }
        .markdown-content h5 { font-size: 1.1rem; }
        .markdown-content h6 { font-size: 1rem; }

        .markdown-content p {
            margin: 1rem 0;
        }

        .markdown-content ul, .markdown-content ol {
            margin: 1rem 0;
            padding-left: 2rem;
        }

        .markdown-content li {
            margin: 0.5rem 0;
        }

        .markdown-content a {
            color: #a0896b;
            text-decoration: none;
            border-bottom: 1px dotted #a0896b;
            transition: all 0.3s ease;
        }

        .markdown-content a:hover {
            color: #8b7355;
            border-bottom-style: solid;
        }

        .markdown-content code {
            background: rgba(160, 137, 107, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #8b7355;
        }

        .markdown-content pre {
            background: #2d3748;
            border-radius: 8px;
            padding: 1rem;
            overflow-x: auto;
            margin: 1rem 0;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.2);
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
            color: #e2e8f0;
        }

        .markdown-content blockquote {
            border-left: 4px solid #a0896b;
            padding-left: 1rem;
            margin: 1rem 0;
            background: rgba(160, 137, 107, 0.1);
            border-radius: 0 4px 4px 0;
        }

        .markdown-content hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e6dcc9, transparent);
            margin: 2rem 0;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1rem 0;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.2);
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            background: rgba(255, 253, 249, 0.9);
            border-radius: 8px;
            overflow: hidden;
        }

        .markdown-content th, .markdown-content td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid #e6dcc9;
        }

        .markdown-content th {
            background: rgba(160, 137, 107, 0.2);
            font-weight: bold;
            color: #8b7355;
        }

        /* Mermaid 圖表樣式 */
        .mermaid {
            background: rgba(255, 253, 249, 0.9);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.1);
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                padding: 1rem;
            }
            
            .sidebar.collapsed {
                width: 100%;
                height: 60px;
                overflow: hidden;
            }
            
            .articles-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 載入動畫 */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #a0896b;
            font-size: 1.2rem;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>

        // 側邊欄切換
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            
            const toggleBtn = document.querySelector('.sidebar-toggle');
            toggleBtn.textContent = sidebar.classList.contains('collapsed') ? '→' : '←';

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                
                // 移除所有活動狀態
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                // 隱藏所有頁面
                document.querySelectorAll('[id$="-page"]').forEach(page => {
                    page.style.display = 'none';

                // 顯示選中的頁面

                const targetPage = document.getElementById(pageId);
                if (targetPage) {
                    targetPage.style.display = 'block';
                }
            });

        // Markdown 轉 HTML 函數
        function markdownToHtml(markdown) {
            if (!markdown) return '';
            
            let html = markdown;

            // 處理程式碼區塊 (```language...```)
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                const language = lang || 'javascript';
                return `<pre><code class="language-${language}">${escapeHtml(code.trim())}</code></pre>`;
            });

            // 處理 Mermaid 圖表
            html = html.replace(/```mermaid\n([\s\S]*?)```/g, (match, diagram) => {
                const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                return `<div class="mermaid" id="${id}">${diagram.trim()}</div>`;
            });

            // 處理行內程式碼
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // 處理標題 (# ## ### ...)
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            html = html.replace(/^#### (.*$)/gm, '<h4>$1</h4>');
            html = html.replace(/^##### (.*$)/gm, '<h5>$1</h5>');
            html = html.replace(/^###### (.*$)/gm, '<h6>$1</h6>');

            // 處理分隔線
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^\*\*\*$/gm, '<hr>');

            // 處理圖片
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

            // 處理連結
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // 處理粗體和斜體
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 處理無序列表
            html = html.replace(/^\* (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // 處理有序列表
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            // 將連續的 <li> 包裝在 <ol> 中
            html = html.replace(/(<li>.*?<\/li>)(?:\s*<li>.*?<\/li>)*/g, (match) => {
                if (match.includes('<ul>') || match.includes('<ol>')) return match;
                return `<ol>${match}</ol>`;
            });

            // 處理引用
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // 處理段落
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';

            // 清理多餘的空標籤
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1-6]>)/g, '$1');
            html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<hr>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ol>)/g, '$1');
            html = html.replace(/(<\/ol>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote>)/g, '$1');
            html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
            html = html.replace(/<p>(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');
            html = html.replace(/<p>(<div class="mermaid")/g, '$1');
            html = html.replace(/(<\/div>)<\/p>/g, '$1');

            return html;
        }

        // HTML 轉義函數
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadSampleData() {

                    date: new Date('2024-12-01'),
                    image: "https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=400&h=200&fit=crop",
                    hashtags: ["咖啡", "生活", "品味"]

                {
