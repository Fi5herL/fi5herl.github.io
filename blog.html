<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎣</text></svg>">
    <title>Fisher Blog</title>
    <style>
        /* Tech Blogger Theme CSS - Embedded */
        /* Global Variables */
        :root {
            --font-body: 'Roboto', 'Open Sans', 'Helvetica Neue', sans-serif;
            --font-heading: 'Montserrat', 'Roboto', sans-serif;

            --color-bg-body: #f4f7f9;
            --color-bg-sidebar: #2c3e50; /* Dark slate blue/charcoal */
            --color-bg-card: #ffffff;
            --color-bg-header-page: #ffffff;
            --color-bg-controls: #fdfdfd;

            --color-text-primary: #34495e; /* Dark grayish blue for body text */
            --color-text-secondary: #7f8c8d; /* Medium gray for less important text */
            --color-text-on-dark: #ecf0f1; /* Light gray/off-white for text on dark bg */
            --color-text-heading: #2c3e50; /* Darker for headings */

            --color-accent: #3498db;          /* Bright blue */
            --color-accent-hover: #2980b9;    /* Darker blue for hover */
            --color-tag-bg: rgba(52, 152, 219, 0.1); /* Light accent for tag bg */
            --color-tag-text: var(--color-accent);

            --color-border: #e0e6ed;          /* Light border color */
            --color-shadow: rgba(44, 62, 80, 0.15); /* Subtle shadow */

            --border-radius-sm: 6px;
            --border-radius-md: 12px;
            --border-radius-lg: 20px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap');

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-bg-body);
            color: var(--color-text-primary);
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--color-bg-sidebar);
            color: var(--color-text-on-dark);
            padding: 1.5rem 1rem;
            transition: width 0.3s ease;
            position: relative;
            box-shadow: 3px 0 15px var(--color-shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed {
            width: 70px;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .sidebar-toggle {
            position: absolute;
            top: 1.5rem;
            right: -18px; /* Adjusted for no border */
            background: transparent; /* No background initially */
            border: none; /* No border */
            border-radius: 50%;
            width: 36px; /* Slightly larger for emoji */
            height: 36px; /* Slightly larger for emoji */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px; /* Adjusted for emoji size */
            color: var(--color-text-on-dark); /* Icon color for visibility on sidebar edge */
            transition: all 0.3s ease;
            box-shadow: none; /* No shadow */
            z-index: 10;
            /* Optional: Add a subtle background on hover if needed */
        }

        .sidebar-toggle:hover {
            /* background: rgba(255, 255, 255, 0.1); Optional hover effect */
            transform: scale(1.2); /* Slightly larger pop on hover */
            color: var(--color-accent); /* Change color on hover */
        }


        .logo {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-text-on-dark);
            margin-bottom: 2.5rem;
            text-align: center;
            opacity: 1;
            transition: opacity 0.3s ease, height 0.3s ease, margin 0.3s ease, font-size 0.3s ease;
            overflow: hidden;
            white-space: nowrap;
        }

        .sidebar.collapsed .logo {
            opacity: 0; height: 0; margin-bottom: 0; font-size: 0;
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            color: var(--color-text-on-dark);
            text-decoration: none;
            border-radius: var(--border-radius-sm);
            transition: all 0.2s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .sidebar.collapsed .nav-link {
            justify-content: center;
            padding: 0.8rem 0.25rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-link.active {
            background: var(--color-accent);
            color: var(--color-text-on-dark) !important;
            font-weight: 500;
        }
        .nav-link.active .nav-icon {
            color: var(--color-text-on-dark);
        }

        .nav-icon {
            margin-right: 0.8rem;
            font-size: 1.2rem;
            transition: opacity 0.3s ease, margin-right 0.3s ease, font-size 0.3s ease;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .sidebar.collapsed .nav-icon {
            margin-right: 0;
            font-size: 1.3rem;
        }

        .nav-text {
            transition: opacity 0.3s ease 0.1s, width 0.3s ease 0.1s;
            white-space: nowrap;
            overflow: hidden;
            font-size: 0.95rem;
        }

        .sidebar.collapsed .nav-text {
            opacity: 0; width: 0;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 2rem;
            transition: all 0.3s ease;
            overflow-y: auto;
        }

        .page-container {
            background: var(--color-bg-card);
            padding: 2rem;
            border-radius: var(--border-radius-md);
            box-shadow: 0 5px 25px var(--color-shadow);
            margin-top: 1.5rem;
        }
        #home-page .page-container {
            background: none;
            padding: 0;
            box-shadow: none;
            margin-top: 0;
        }

        .header {
            background: var(--color-bg-header-page);
            padding: 2rem 2.5rem;
            border-radius: var(--border-radius-md);
            margin-bottom: 1.5rem;
            box-shadow: 0 5px 25px var(--color-shadow);
        }

        .header h1 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: var(--color-text-heading);
            margin-bottom: 0.5rem;
            text-align: center;
            font-weight: 600;
        }

        .header p {
            text-align: center;
            font-size: 1.05rem;
            color: var(--color-text-secondary);
        }

        /* Controls Panel */
        .controls {
            background: var(--color-bg-controls);
            padding: 1.5rem;
            border-radius: var(--border-radius-md);
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid var(--color-border);
        }

        .sort-controls, .filter-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sort-controls label, .filter-controls label {
            font-weight: 500;
            color: var(--color-text-primary);
            font-size: 0.9rem;
        }

        select, button {
            padding: 0.6rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius-sm);
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            font-family: var(--font-body);
            transition: all 0.2s ease-in-out;
            font-size: 0.9rem;
        }

        select:focus, button:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        button {
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            border-color: var(--color-accent-hover);
            color: var(--color-accent-hover);
        }

        button.active {
            background: var(--color-accent);
            color: var(--color-text-on-dark);
            border-color: var(--color-accent);
        }

        .hashtag-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .hashtag-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 15px;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
        }
        .hashtag-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }
        .hashtag-btn.active {
            background: var(--color-accent);
            color: var(--color-text-on-dark);
            border-color: var(--color-accent);
        }

        /* Articles Grid */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .article-card {
            background: var(--color-bg-card);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            box-shadow: 0 5px 20px var(--color-shadow);
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(44, 62, 80, 0.2);
        }

        .article-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
            border-bottom: 1px solid var(--color-border);
        }

        .article-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .article-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text-heading);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }
        .article-title:hover {
            color: var(--color-accent);
        }

        .article-date {
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .article-preview {
            color: var(--color-text-primary);
            opacity: 0.9;
            margin-bottom: 1rem;
            line-height: 1.6;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .article-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            background: var(--color-tag-bg);
            color: var(--color-tag-text);
            padding: 0.25rem 0.6rem;
            border-radius: var(--border-radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid transparent;
        }
        .tag:hover {
            border-color: var(--color-accent);
        }

        /* Markdown Content Styles */
        .markdown-content {
            line-height: 1.8;
            color: var(--color-text-primary);
            font-size: 1rem;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3, 
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            font-family: var(--font-heading);
            color: var(--color-text-heading);
            margin: 2rem 0 1rem 0;
            font-weight: 600;
            line-height: 1.3;
        }

        .markdown-content h1 { font-size: 2em; border-bottom: 2px solid var(--color-border); padding-bottom: 0.5rem; }
        .markdown-content h2 { font-size: 1.7em; border-bottom: 1px solid var(--color-border); padding-bottom: 0.4rem; }
        .markdown-content h3 { font-size: 1.4em; }
        .markdown-content h4 { font-size: 1.2em; color: var(--color-text-secondary); }
        .markdown-content h5 { font-size: 1.1em; color: var(--color-text-secondary); }
        .markdown-content h6 { font-size: 1em; color: var(--color-text-secondary); text-transform: uppercase; }

        .markdown-content p {
            margin: 0 0 1.2rem 0;
        }

        .markdown-content ul, .markdown-content ol {
            margin: 0 0 1.2rem 1.5rem;
            padding-left: 1.5rem;
        }
        .markdown-content ul { list-style-type: disc; }
        .markdown-content ol { list-style-type: decimal; }

        .markdown-content li {
            margin: 0.5rem 0;
        }
        .markdown-content li p { margin-bottom: 0.3rem; }

        .markdown-content a {
            color: var(--color-accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .markdown-content a:hover {
            color: var(--color-accent-hover);
            border-bottom-color: var(--color-accent-hover);
        }

        .markdown-content code:not(pre > code) {
            background: rgba(224, 230, 237, 0.7);
            padding: 0.2em 0.4em;
            border-radius: var(--border-radius-sm);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 0.9em;
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }

        .markdown-content pre {
            background: #2d2d2d;
            border-radius: var(--border-radius-sm);
            padding: 1.2rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            box-shadow: 0 4px 10px var(--color-shadow);
            border: 1px solid #444;
        }

        .markdown-content pre code {
            background: none !important;
            padding: 0 !important;
            color: #ccc !important;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace !important;
            font-size: 0.9em !important;
            border: none !important;
            text-shadow: none !important;
            direction: ltr !important;
            text-align: left !important;
            white-space: pre !important;
            word-spacing: normal !important;
            word-break: normal !important;
            word-wrap: normal !important;
            line-height: 1.5 !important;
            -moz-tab-size: 4 !important;
            -o-tab-size: 4 !important;
            tab-size: 4 !important;
            -webkit-hyphens: none !important;
            -moz-hyphens: none !important;
            -ms-hyphens: none !important;
            hyphens: none !important;
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--color-accent);
            padding: 0.5rem 1.5rem;
            margin: 1.5rem 0;
            background: rgba(52, 152, 219, 0.05);
            color: var(--color-text-secondary);
            border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;
        }
        .markdown-content blockquote p {
            margin-bottom: 0.5rem;
        }
        .markdown-content blockquote p:last-child {
            margin-bottom: 0;
        }

        .markdown-content hr {
            border: none;
            height: 1px;
            background: var(--color-border);
            margin: 2.5rem 0;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius-sm);
            margin: 1.5rem 0;
            box-shadow: 0 4px 15px var(--color-shadow);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            background: var(--color-bg-card);
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            border: 1px solid var(--color-border);
            box-shadow: 0 2px 8px var(--color-shadow);
        }

        .markdown-content th, .markdown-content td {
            padding: 0.8rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }
        .markdown-content tr:last-child td {
            border-bottom: none;
        }

        .markdown-content th {
            background: var(--color-bg-body);
            font-weight: 600;
            color: var(--color-text-heading);
        }

        /* Mermaid Diagram Styles */
        .mermaid {
            background: var(--color-bg-card);
            border-radius: var(--border-radius-sm);
            padding: 1.5rem;
            margin: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 10px var(--color-shadow);
            border: 1px solid var(--color-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mermaid svg { max-width: 100%; }

        /* Responsive Design */
        @media (max-width: 992px) {
            .sidebar { width: 220px; }
            .sidebar.collapsed { width: 60px; }
            .main-content { padding: 1.5rem; }
            .header { padding: 1.5rem; }
            .header h1 { font-size: 1.8rem; }
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar {
                width: 100%; height: auto; padding: 0.75rem 1rem;
                border-right: none;
                border-bottom: 1px solid var(--color-bg-sidebar);
                box-shadow: 0 3px 10px var(--color-shadow);
            }
            .sidebar.collapsed {
                width: 100%; height: 50px;
                padding: 0 1rem;
                overflow: hidden;
            }
            .sidebar-toggle { /* Adjusted for mobile and no border */
                background: transparent; /* Ensure transparent on mobile too */
                color: var(--color-text-on-dark); /* Make it visible on dark bar */
                border: none;
                top: 50%; /* Vertically center */
                transform: translateY(-50%) translateX(5px); /* Adjust horizontal position */
                right: 1rem; /* Position from the right edge */
            }
            .sidebar.collapsed .logo { display: none; }
            .sidebar .logo { margin-bottom: 1rem; font-size: 1.4rem; }

            .sidebar .nav-menu {
                display: flex; flex-direction: row;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
             .sidebar .nav-item { margin-bottom: 0; margin-right: 0.5rem;}
             .sidebar .nav-link { padding: 0.5rem 0.8rem; }
             .sidebar .nav-icon { margin-right: 0.4rem; font-size: 1rem; }
             .sidebar .nav-text { font-size: 0.85rem; }

            .sidebar.collapsed .nav-menu {
                display: flex; flex-direction: row;
                justify-content: space-around; align-items: center;
                height: 100%;
            }
            .sidebar.collapsed .nav-item { margin-bottom: 0; margin-right: 0; }
            .sidebar.collapsed .nav-link { padding: 0.5rem; }
            .sidebar.collapsed .nav-icon { font-size: 1.2rem; }

            .articles-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .main-content { padding: 1rem; }
            .header { padding: 1rem 1.5rem; margin-bottom: 1rem; }
            .header h1 { font-size: 1.6rem; }
            .page-container { padding: 1.5rem; margin-top: 1rem;}
            .controls { padding: 1rem; gap: 1rem; }
            .markdown-content { font-size: 0.95rem; }
            .markdown-content h1 {font-size: 1.8em;}
            .markdown-content h2 {font-size: 1.5em;}
            .markdown-content h3 {font-size: 1.25em;}
        }

        /* Loading Animation */
        .loading {
            text-align: center; padding: 3rem;
            color: var(--color-text-secondary); font-size: 1.1rem;
        }
        .loading::after { content: '...'; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }

        /* Category and Archive Page Specific Styles */
        .categories-list, .archive-list { list-style: none; padding: 0; }

        .categories-list li { margin-bottom: 0.75rem; }
        .categories-list .category-link {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background-color: var(--color-bg-body);
            color: var(--color-text-primary);
            border-radius: var(--border-radius-sm);
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid var(--color-border);
            font-weight: 500;
        }
        .categories-list .category-link:hover {
            background-color: var(--color-accent);
            color: var(--color-text-on-dark);
            border-color: var(--color-accent);
            transform: translateY(-2px);
            box-shadow: 0 2px 5px var(--color-shadow);
        }

        .archive-year {
            font-family: var(--font-heading);
            font-size: 1.6rem; color: var(--color-text-heading);
            margin-top: 2rem; margin-bottom: 0.8rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid var(--color-border);
        }
        .archive-month {
            font-family: var(--font-heading);
            font-size: 1.2rem; color: var(--color-text-primary);
            margin-top: 1.2rem; margin-bottom: 0.5rem; padding-left: 1rem;
            font-weight: 500;
        }
        .archive-list li { margin-bottom: 0.6rem; padding-left: 2rem; }
        .archive-list .archive-link {
            color: var(--color-text-primary);
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 500;
        }
        .archive-list .archive-link:hover { color: var(--color-accent); }
        .archive-list .archive-date {
            font-size: 0.8em; color: var(--color-text-secondary);
            margin-right: 0.75em;
            display: inline-block;
            width: 45px;
        }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.4.0/mermaid.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
</head>

<body>
    <div class="container">
        <nav class="sidebar" id="sidebar">
            <button class="sidebar-toggle" onclick="toggleSidebar()">🎣</button>
            <div class="logo">Fisher Blog</div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link active" data-page="home">
                        <span class="nav-icon">🏠</span><span class="nav-text">首頁</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="about">
                        <span class="nav-icon">😎</span><span class="nav-text">關於我</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="categories">
                        <span class="nav-icon">📚</span><span class="nav-text">分類</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="archive">
                        <span class="nav-icon">📂</span><span class="nav-text">文章歸檔</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="contact">
                        <span class="nav-icon">📧</span><span class="nav-text">聯絡我</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <div id="home-page" style="display: block;">
                <header class="header">
                    <h1>Life Hack & Tech Journal</h1>
                    <p>Welcome every Hacking Happy Day🙂</p>
                </header>
                <div class="page-container">
                    <div class="controls">
                        <div class="sort-controls">
                            <label>排序：</label>
                            <select id="sortSelect">
                                <option value="newest">最新</option>
                                <option value="oldest">最舊</option>
                            </select>
                        </div>
                        <div class="filter-controls">
                            <label>標籤：</label>
                            <button onclick="clearFilters()">全部</button>
                        </div>
                        <div class="hashtag-filters" id="hashtagFilters"></div>
                    </div>
                    <div class="articles-grid" id="articlesGrid">
                        <div class="loading">載入文章中...</div>
                    </div>
                </div>
            </div>

            <div id="about-page" style="display: none;">
                <header class="header"><h1 id="about-title">關於我</h1></header>
                <div class="page-container">
                    <div class="markdown-content" id="about-content"><div class="loading">載入內容中...</div></div>
                </div>
            </div>

            <div id="categories-page" style="display: none;">
                <header class="header"><h1 id="categories-title">文章分類</h1></header>
                <div class="page-container">
                    <div id="categories-content"><div class="loading">載入分類中...</div></div>
                </div>
            </div>

            <div id="archive-page" style="display: none;">
                <header class="header"><h1 id="archive-title">文章歸檔</h1></header>
                <div class="page-container">
                    <div id="archive-content"><div class="loading">載入歸檔中...</div></div>
                </div>
            </div>

            <div id="contact-page" style="display: none;">
                <header class="header"><h1 id="contact-title">聯絡方式</h1></header>
                <div class="page-container">
                    <div class="markdown-content" id="contact-content"><div class="loading">載入內容中...</div></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allData = { articles: [], pages: {} };
        let articles = [];
        let pagesContent = {};
        let filteredArticles = [];
        let currentHashtag = '';
        
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'neutral',
            themeVariables: { 
                primaryColor: getComputedStyle(document.documentElement).getPropertyValue('--color-bg-card').trim() || '#ffffff',
                primaryTextColor: getComputedStyle(document.documentElement).getPropertyValue('--color-text-primary').trim() || '#34495e',
                primaryBorderColor: getComputedStyle(document.documentElement).getPropertyValue('--color-border').trim() || '#e0e6ed',
                lineColor: getComputedStyle(document.documentElement).getPropertyValue('--color-accent').trim() || '#3498db',
            }
        });
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            const toggleBtn = document.querySelector('.sidebar-toggle');
            // For simplicity, always show rocket. Could use different icons for open/closed state.
            // toggleBtn.textContent = sidebar.classList.contains('collapsed') ? '🚀' : '💨'; // Example
             toggleBtn.textContent = '🎣'; // Always rocket for now
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.main-content > div[id$="-page"]').forEach(page => {
                    page.style.display = 'none';
                });
                const articleDetailPage = document.getElementById('article-detail-page');
                if (articleDetailPage) articleDetailPage.remove();
                
                const pageId = this.dataset.page + '-page';
                const targetPage = document.getElementById(pageId);
                if (targetPage) {
                    targetPage.style.display = 'block';
                    window.scrollTo(0, 0);
                    if (pageId === 'home-page' && articles.length > 0) {
                        sortAndDisplayArticles(); 
                    } else if (pageId === 'about-page') {
                        renderStaticPage('about');
                    } else if (pageId === 'categories-page') {
                        renderCategoriesPage();
                    } else if (pageId === 'archive-page') {
                        renderArchivePage();
                    } else if (pageId === 'contact-page') {
                        renderStaticPage('contact');
                    }
                } else {
                    const homePage = document.getElementById('home-page');
                    if (homePage) homePage.style.display = 'block';
                }
            });
        });

        function markdownToHtml(markdown) {
            if (typeof markdown !== 'string' || !markdown) return '';
            let html = markdown;
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/gs, (match, lang, code) => {
                const language = lang || 'plaintext';
                return `<pre><code class="language-${language}">${escapeHtml(code.trim())}</code></pre>`;
            });
            html = html.replace(/^```mermaid\n([\s\S]*?)\n```$/gm, (match, diagram) => {
                const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                return `<div class="mermaid" id="${id}">${diagram.trim()}</div>`;
            });
            html = html.replace(/^###### (.*$)/gm, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            html = html.replace(/^(\*\*\*|---|\*\s\*\s\*)$/gm, '<hr>');
            html = html.replace(/^[\s]*([*+-]) +([^\n]+)/gm, (m,b,i) => `<li>${i.trim()}</li>`);
            html = html.replace(/(<li>.+?<\/li>\s*)+/gm, (match) => {
                if(!match.trim().startsWith("<li>")) return match; 
                return `<ul>\n${match.trim()}\n</ul>`;
            });
            html = html.replace(/^[\s]*(\d+)\. +([^\n]+)/gm, (m,n,i) => `<li>${i.trim()}</li>`);
            html = html.replace(/^> +(.*)/gm, (match, content) => `<blockquote><p>${content.trim()}</p></blockquote>`);
            html = html.replace(/<\/blockquote>\s*<blockquote>/g, '');
            html = html.split(/\n\s*\n/).map(paragraph => {
                const trimmed = paragraph.trim();
                if (!trimmed) return '';
                if (/^<\/?(h[1-6]|ul|ol|li|hr|blockquote|pre|div)/.test(trimmed)) {
                    return paragraph;
                }
                return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
            }).join('');
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            html = html.replace(/\*\*([^\s*](?:[^*]*[^\s*])?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^\s*](?:[^*]*[^\s*])?)\*/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/<p>\s*<\/(ul|ol|h[1-6]|hr|blockquote|pre|div)>/gi, '</$1>');
            html = html.replace(/<(ul|ol|h[1-6]|hr|blockquote|pre|div)>\s*<\/p>/gi, '<$1>');
            html = html.replace(/<p>\s*<\/p>/g, '');
            return html;
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadData() {
            const mainLoadingIndicator = document.getElementById('articlesGrid').querySelector('.loading') || document.createElement('div');
            mainLoadingIndicator.style.display = 'block';
            mainLoadingIndicator.textContent = '載入資料中...';

            try {
                const gasUrl = 'https://script.google.com/macros/s/AKfycbxrM67dWveK91ty2SWHY_Fz55Vtyf76hVc1lywYMRrHKLY1lz-DdYdm8ivu6dRDb_jE/exec';
                
                const response = await fetch(gasUrl);
                if (!response.ok) throw new Error(`HTTP 錯誤！狀態: ${response.status}`);
                
                const fetchedData = await response.json();
                if (fetchedData.error) throw new Error(`GAS 錯誤: ${fetchedData.error} - ${fetchedData.message || ''}`);
                
                allData = fetchedData;
                articles = (allData.articles || []).map(row => ({
                    title: row[0] || "無標題",
                    content: row[1] || "",
                    date: row[2] ? new Date(row[2]) : null,
                    image: row[3] || "https://images.unsplash.com/photo-1518770660439-4636190af475?w=400&h=200&fit=crop",
                    hashtags: row[4] && typeof row[4] === 'string' ? row[4].split(',').map(tag => tag.trim()).filter(tag => tag) : []
                })).filter(article => article.title !== "無標題" && article.date);

                pagesContent = allData.pages || {};

                filteredArticles = [...articles];
                generateHashtagFilters();
                sortAndDisplayArticles();

                if(pagesContent.about) renderStaticPage('about');
                if(pagesContent.contact) renderStaticPage('contact');
                renderCategoriesPage();
                renderArchivePage();

                if (articles.length === 0 && !document.getElementById('article-detail-page')) {
                    document.getElementById('articlesGrid').innerHTML = '<div class="loading">目前沒有文章。</div>';
                }

            } catch (error) {
                console.error('載入資料失敗:', error);
                const articlesGrid = document.getElementById('articlesGrid');
                if(articlesGrid) articlesGrid.innerHTML = `<div class="loading">載入資料失敗: ${error.message}<br>請檢查 Google Sheets 設定和 GAS URL。</div>`;
            }
        }
        
        function renderStaticPage(pageName) {
            const pageData = pagesContent[pageName];
            const titleElement = document.getElementById(`${pageName}-title`);
            const contentElement = document.getElementById(`${pageName}-content`);
            if (!contentElement) return;

            if (pageData && pageData.content) {
                if (titleElement && pageData.title) titleElement.textContent = pageData.title;
                contentElement.innerHTML = markdownToHtml(pageData.content);
                setTimeout(() => {
                    if (typeof mermaid !== 'undefined' && typeof mermaid.run === 'function') {
                        mermaid.run({ nodes: contentElement.querySelectorAll('.mermaid') });
                    }
                    if (typeof Prism !== 'undefined') Prism.highlightAllUnder(contentElement);
                }, 100);
            } else {
                if (titleElement) titleElement.textContent = pageName.charAt(0).toUpperCase() + pageName.slice(1);
                contentElement.innerHTML = `<p>此頁面 (${pageName}) 內容尚未設定。</p>`;
            }
        }

        function renderCategoriesPage() {
            const contentElement = document.getElementById('categories-content');
            if (!contentElement) return;
            const allHashtags = new Set();
            articles.forEach(article => (article.hashtags || []).forEach(tag => allHashtags.add(tag)));
            if (allHashtags.size === 0) {
                contentElement.innerHTML = '<p>目前沒有分類標籤。</p>'; return;
            }
            let html = '<ul class="categories-list">';
            allHashtags.forEach(tag => {
                html += `<li><a href="#" class="category-link" data-hashtag="${escapeHtml(tag)}">#${escapeHtml(tag)}</a></li>`;
            });
            html += '</ul>';
            contentElement.innerHTML = html;
            contentElement.querySelectorAll('.category-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const hashtag = e.target.dataset.hashtag;
                    document.querySelector('.nav-link[data-page="home"]').click();
                    setTimeout(() => filterByHashtag(hashtag, true), 100);
                });
            });
        }
        
        function renderArchivePage() {
            const contentElement = document.getElementById('archive-content');
            if (!contentElement || articles.length === 0) {
                if(contentElement) contentElement.innerHTML = '<p>目前沒有文章可供歸檔。</p>';
                return;
            }
            const articlesByYearMonth = {};
            articles.sort((a, b) => b.date.getTime() - a.date.getTime())
                   .forEach(article => {
                const year = article.date.getFullYear();
                const month = article.date.getMonth();
                if (!articlesByYearMonth[year]) articlesByYearMonth[year] = {};
                if (!articlesByYearMonth[year][month]) articlesByYearMonth[year][month] = [];
                articlesByYearMonth[year][month].push(article);
            });
            let html = '<ul class="archive-list">';
            const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
            Object.keys(articlesByYearMonth).sort((a, b) => b - a).forEach(year => {
                html += `<li class="archive-year">${year}</li>`;
                Object.keys(articlesByYearMonth[year]).sort((a, b) => b - a).forEach(monthIndex => {
                    html += `<li class="archive-month">${monthNames[parseInt(monthIndex)]}</li>`;
                    articlesByYearMonth[year][monthIndex].forEach(article => {
                        const articleDateStr = article.date.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });
                        html += `<li><span class="archive-date">${articleDateStr}</span> <a href="#" class="archive-link" data-article-title="${escapeHtml(article.title)}">${escapeHtml(article.title)}</a></li>`;
                    });
                });
            });
            html += '</ul>';
            contentElement.innerHTML = html;
            contentElement.querySelectorAll('.archive-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const articleTitle = e.target.dataset.articleTitle;
                    const articleToOpen = articles.find(art => art.title === articleTitle);
                    if(articleToOpen) openArticle(articleToOpen);
                });
            });
        }

        function generateHashtagFilters() {
            const allHashtags = new Set();
            articles.forEach(article => (article.hashtags || []).forEach(tag => allHashtags.add(tag)));
            const filtersContainer = document.getElementById('hashtagFilters');
            if (!filtersContainer) return;
            filtersContainer.innerHTML = '';
            allHashtags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'hashtag-btn';
                btn.textContent = `#${tag}`;
                btn.onclick = () => filterByHashtag(tag);
                filtersContainer.appendChild(btn);
            });
        }

        function filterByHashtag(hashtag, activateButton = false) {
            if (activateButton) {
                currentHashtag = hashtag;
            } else {
                currentHashtag = currentHashtag === hashtag ? '' : hashtag;
            }
            document.querySelectorAll('.hashtag-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === `#${hashtag}` && currentHashtag === hashtag);
            });
            filteredArticles = currentHashtag ? articles.filter(article => (article.hashtags || []).includes(currentHashtag)) : [...articles];
            sortAndDisplayArticles();
        }

        function clearFilters() {
            currentHashtag = '';
            filteredArticles = [...articles];
            document.querySelectorAll('.hashtag-btn').forEach(btn => btn.classList.remove('active'));
            sortAndDisplayArticles();
        }

        function sortAndDisplayArticles() {
            const sortSelect = document.getElementById('sortSelect');
            if (!sortSelect) return;
            const sortBy = sortSelect.value;
            filteredArticles.sort((a, b) => {
                if (!a.date || !b.date) return 0;
                return sortBy === 'newest' ? b.date.getTime() - a.date.getTime() : a.date.getTime() - b.date.getTime();
            });
            displayArticles();
        }

        function displayArticles() {
            const grid = document.getElementById('articlesGrid');
            if (!grid) return;
            grid.innerHTML = ''; 
            if (filteredArticles.length === 0) {
                grid.innerHTML = '<div class="loading">沒有找到相關文章。</div>'; return;
            }
            filteredArticles.forEach(article => {
                const plainTextContent = (article.content || "").replace(/[#*`>\-\[\]()!]/g, '').replace(/\n/g, ' ').trim();
                const preview = plainTextContent.length > 100 ? plainTextContent.substring(0, 100) + '...' : plainTextContent;
                const displayDate = article.date instanceof Date && !isNaN(article.date)
                                    ? article.date.toLocaleDateString('zh-TW') : '日期未知';
                const articleCard = document.createElement('article');
                articleCard.className = 'article-card';
                articleCard.innerHTML = `
                    <img src="${article.image || 'https://via.placeholder.com/400x200.png?text=No+Image'}" alt="${escapeHtml(article.title)}" class="article-image">
                    <div class="article-content">
                        <h3 class="article-title">${escapeHtml(article.title)}</h3>
                        <div class="article-date">${displayDate}</div>
                        <p class="article-preview">${escapeHtml(preview)}</p>
                        <div class="article-tags">
                            ${(article.hashtags || []).map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    </div>`;
                articleCard.addEventListener('click', () => openArticle(article));
                grid.appendChild(articleCard);
            });
        }
        
        function openArticle(article) {
            const renderedContent = markdownToHtml(article.content);
            const displayDate = article.date instanceof Date && !isNaN(article.date)
                                ? article.date.toLocaleDateString('zh-TW') : '日期未知';
            const articlePageId = 'article-detail-page';
            let articlePage = document.getElementById(articlePageId);
            if (articlePage) articlePage.remove(); 
            articlePage = document.createElement('div');
            articlePage.id = articlePageId; 
            articlePage.style.display = 'block'; 
            articlePage.innerHTML = `
                <header class="header">
                    <button onclick="closeArticle()" style="float: right; background: transparent; border: none; font-size: 1.5rem; cursor: pointer; color: var(--color-text-primary); padding: 0.5rem 1rem; line-height: 1;">✕</button>
                    <h1>${escapeHtml(article.title)}</h1>
                    <p>發布於 ${displayDate}</p>
                    <div style="text-align: center; margin-top: 1rem;">
                        ${(article.hashtags || []).map(tag => `<span class="tag" style="margin: 0 0.2rem;">#${escapeHtml(tag)}</span>`).join('')}
                    </div>
                </header>
                <div class="page-container">
                    <div class="markdown-content">${renderedContent}</div>
                </div>`;
            document.querySelectorAll('.main-content > div[id$="-page"]').forEach(page => page.style.display = 'none');
            document.querySelector('.main-content').appendChild(articlePage);
            window.scrollTo(0, 0); 
            setTimeout(() => {
                if (typeof mermaid !== 'undefined' && typeof mermaid.run === 'function') {
                     mermaid.run({ nodes: articlePage.querySelectorAll('.mermaid') });
                }
                if (typeof Prism !== 'undefined') Prism.highlightAllUnder(articlePage);
            }, 100);
        }

        function closeArticle() {
            const articlePage = document.getElementById('article-detail-page');
            if (articlePage) articlePage.remove();
            const homePage = document.getElementById('home-page');
            if (homePage) homePage.style.display = 'block';
            if (articles.length > 0) sortAndDisplayArticles();
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const homeLink = document.querySelector('.nav-link[data-page="home"]');
            if (homeLink) homeLink.classList.add('active');
        }

        const sortSelectElement = document.getElementById('sortSelect');
        if (sortSelectElement) {
            sortSelectElement.addEventListener('change', sortAndDisplayArticles);
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            // Ensure the toggle button icon is set correctly on load
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.querySelector('.sidebar-toggle');
            if (sidebar && toggleBtn) {
                 toggleBtn.textContent = '🚀'; // Set initial icon for toggle button
            }

            const initialActiveLink = document.querySelector('.nav-link[data-page="home"]');
            if(initialActiveLink) initialActiveLink.classList.add('active');
            const homePage = document.getElementById('home-page');
            if(homePage) homePage.style.display = 'block';
        });
    </script>
</body>
</html>
