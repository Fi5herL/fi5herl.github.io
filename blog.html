<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Milk Blog</title>
    <style>
        /* CSS 樣式與之前版本基本一致，這裡省略以節省空間 */
        /* 但請確保你使用的是我上次提供的包含側邊欄收闔修正的版本 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #f8f6f2 0%, #f5f2eb 100%);
            color: #8b7355;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 左側導航 */
        .sidebar {
            width: 280px;
            background: rgba(255, 253, 249, 0.9);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(222, 216, 202, 0.3);
            padding: 2rem 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 2px 0 20px rgba(139, 115, 85, 0.1);
            display: flex; 
            flex-direction: column; 
        }

        .sidebar.collapsed {
            width: 80px;
            padding-left: 0.5rem; 
            padding-right: 0.5rem; 
        }

        .sidebar-toggle {
            position: absolute;
            top: 1rem;
            right: -15px; 
            background: #f5f2eb;
            border: 2px solid #e6dcc9;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #8b7355;
            transition: all 0.3s ease;
            z-index: 10; 
        }

        .sidebar-toggle:hover {
            background: #e6dcc9;
            transform: scale(1.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #a0896b;
            margin-bottom: 2rem;
            text-align: center;
            opacity: 1;
            transition: opacity 0.3s ease, height 0.3s ease, margin 0.3s ease, font-size 0.3s ease; 
            overflow: hidden; 
            white-space: nowrap; 
        }

        .sidebar.collapsed .logo {
            opacity: 0;
            height: 0; 
            margin-bottom: 0; 
            font-size: 0; 
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1; 
        }

        .nav-item {
            margin-bottom: 1rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 1rem;
            color: #8b7355;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden; 
        }

        .sidebar.collapsed .nav-link {
            justify-content: center; 
            padding: 1rem 0.5rem; 
        }

        .nav-link:hover {
            background: rgba(222, 216, 202, 0.4);
            transform: translateX(5px);
        }
        .sidebar.collapsed .nav-link:hover {
            transform: none; 
        }


        .nav-link.active {
            background: linear-gradient(135deg, #e6dcc9, #d4c8b0);
            color: #6b5b42;
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.2);
        }

        .nav-icon {
            margin-right: 0.8rem;
            font-size: 1.1rem; 
            transition: opacity 0.3s ease, margin-right 0.3s ease, font-size 0.3s ease;
            flex-shrink: 0; 
        }

        .sidebar.collapsed .nav-icon {
            margin-right: 0; 
        }

        .nav-text {
            transition: opacity 0.3s ease, width 0.3s ease;
            white-space: nowrap; 
            overflow: hidden; 
        }

        .sidebar.collapsed .nav-text {
            opacity: 0;
            width: 0; 
        }

        /* 主要內容區 */
        .main-content {
            flex: 1;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .page-container { /* 新增：用於包裹每個頁面內容的容器 */
            background: rgba(255, 253, 249, 0.9);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(139, 115, 85, 0.1);
            margin-top: 2rem; /* 與 header 間隔 */
        }
        #home-page .page-container { /* 首頁的 controls 和 grid 不需要額外的背景包裹 */
            background: none;
            padding: 0;
            box-shadow: none;
            margin-top: 0;
        }


        .header {
            background: rgba(255, 253, 249, 0.8);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 30px rgba(139, 115, 85, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            color: #a0896b;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .header p {
            text-align: center;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* 控制面板 */
        .controls {
            background: rgba(255, 253, 249, 0.9);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 4px 20px rgba(139, 115, 85, 0.1);
        }

        .sort-controls, .filter-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sort-controls label, .filter-controls label {
            font-weight: 600;
            color: #8b7355;
        }

        select, button {
            padding: 0.5rem 1rem;
            border: 2px solid #e6dcc9;
            border-radius: 8px;
            background: white;
            color: #8b7355;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        select:focus, button:focus {
            outline: none;
            border-color: #a0896b;
            box-shadow: 0 0 0 3px rgba(160, 137, 107, 0.2);
        }

        button {
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #f5f2eb;
            transform: translateY(-2px);
        }

        button.active {
            background: #a0896b;
            color: white;
        }

        .hashtag-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .hashtag-btn {
            padding: 0.3rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 20px;
            background: #f5f2eb;
            border: 1px solid #e6dcc9;
        }

        .hashtag-btn.active {
            background: #a0896b;
            color: white;
            border-color: #a0896b;
        }

        /* 文章網格 */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .article-card {
            background: rgba(255, 253, 249, 0.9);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(139, 115, 85, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .article-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(139, 115, 85, 0.2);
        }

        .article-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .article-card:hover .article-image {
            transform: scale(1.05);
        }

        .article-content {
            padding: 1.5rem;
        }

        .article-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #8b7355;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .article-date {
            color: #a0896b;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .article-preview {
            color: #8b7355;
            opacity: 0.8;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .article-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(160, 137, 107, 0.2);
            color: #8b7355;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Markdown 渲染樣式 (與之前版本一致) */
        .markdown-content {
            line-height: 1.8;
            color: #8b7355;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3, 
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            color: #a0896b; margin: 1.5rem 0 1rem 0; font-weight: bold;
        }
        .markdown-content h1 { font-size: 2rem; border-bottom: 2px solid #e6dcc9; padding-bottom: 0.5rem; }
        .markdown-content h2 { font-size: 1.7rem; }
        .markdown-content h3 { font-size: 1.4rem; }
        .markdown-content p { margin: 1rem 0; }
        .markdown-content ul, .markdown-content ol { margin: 1rem 0; padding-left: 2rem; }
        .markdown-content li { margin: 0.5rem 0; }
        .markdown-content a { color: #a0896b; text-decoration: none; border-bottom: 1px dotted #a0896b; transition: all 0.3s ease; }
        .markdown-content a:hover { color: #8b7355; border-bottom-style: solid; }
        .markdown-content code { background: rgba(160, 137, 107, 0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.9em; color: #8b7355; }
        .markdown-content pre { background: #2d3748; border-radius: 8px; padding: 1rem; overflow-x: auto; margin: 1rem 0; box-shadow: 0 4px 15px rgba(139, 115, 85, 0.2); }
        .markdown-content pre code { background: none; padding: 0; color: #e2e8f0; font-family: 'Courier New', monospace; font-size: 0.9em; }
        .markdown-content blockquote { border-left: 4px solid #a0896b; padding-left: 1rem; margin: 1rem 0; background: rgba(160, 137, 107, 0.1); border-radius: 0 4px 4px 0; }
        .markdown-content blockquote p { margin: 0.5rem 0; }
        .markdown-content hr { border: none; height: 2px; background: linear-gradient(90deg, transparent, #e6dcc9, transparent); margin: 2rem 0; }
        .markdown-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 1rem 0; box-shadow: 0 4px 15px rgba(139, 115, 85, 0.2); }
        .markdown-content table { width: 100%; border-collapse: collapse; margin: 1rem 0; background: rgba(255, 253, 249, 0.9); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 10px rgba(139, 115, 85, 0.1); }
        .markdown-content th, .markdown-content td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #e6dcc9; }
        .markdown-content tr:last-child td { border-bottom: none; }
        .markdown-content th { background: rgba(160, 137, 107, 0.2); font-weight: bold; color: #8b7355; }

        /* Mermaid 圖表樣式 (與之前版本一致) */
        .mermaid {
            background: rgba(255, 253, 249, 0.9); border-radius: 8px; padding: 1rem; margin: 1rem 0;
            text-align: center; box-shadow: 0 4px 15px rgba(139, 115, 85, 0.1);
            display: flex; justify-content: center; align-items: center;
        }
        .mermaid svg { max-width: 100%; }


        /* 響應式設計 (與之前版本一致) */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 1rem; border-right: none; border-bottom: 1px solid rgba(222, 216, 202, 0.3); }
            .sidebar.collapsed { width: 100%; height: 60px; padding: 0 1rem; overflow: hidden; }
            .sidebar.collapsed .logo { display: none; }
            .sidebar.collapsed .nav-menu { display: flex; flex-direction: row; justify-content: space-around; align-items: center; height: 100%; }
            .sidebar.collapsed .nav-item { margin-bottom: 0; }
            .sidebar.collapsed .nav-link { padding: 0.5rem; }
            .sidebar.collapsed .sidebar-toggle { top: 50%; transform: translateY(-50%); right: 10px; }
            .articles-grid { grid-template-columns: 1fr; }
            .main-content { padding: 1rem; }
            .header { padding: 1.5rem; }
            .header h1 { font-size: 2rem; }
            .page-container { padding: 1.5rem; margin-top: 1rem;}
        }

        /* 載入動畫 (與之前版本一致) */
        .loading { text-align: center; padding: 3rem; color: #a0896b; font-size: 1.2rem; }
        .loading::after { content: '...'; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }

        /* 分類頁面樣式 */
        .categories-list { list-style: none; padding: 0; }
        .categories-list li { margin-bottom: 0.5rem; }
        .categories-list .category-link {
            display: inline-block;
            padding: 0.5rem 1rem;
            background-color: rgba(160, 137, 107, 0.1);
            color: #8b7355;
            border-radius: 8px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }
        .categories-list .category-link:hover {
            background-color: rgba(160, 137, 107, 0.3);
        }

        /* 文章歸檔頁面樣式 */
        .archive-list { list-style: none; padding: 0; }
        .archive-year { font-size: 1.5rem; color: #a0896b; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .archive-month { font-size: 1.2rem; color: #8b7355; margin-top: 1rem; margin-bottom: 0.3rem; padding-left: 1rem; }
        .archive-list li { margin-bottom: 0.5rem; padding-left: 2rem;}
        .archive-list .archive-link {
            color: #8b7355;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .archive-list .archive-link:hover { color: #a0896b; }
        .archive-list .archive-date { font-size: 0.8em; color: #a0896b; margin-right: 0.5em; }

    </style>
</head>
<body>
    <div class="container">
        <!-- 左側導航 -->
        <nav class="sidebar" id="sidebar">
            <button class="sidebar-toggle" onclick="toggleSidebar()">←</button>
            <div class="logo">My Blog</div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link active" data-page="home">
                        <span class="nav-icon">🏠</span><span class="nav-text">首頁</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="about">
                        <span class="nav-icon">👤</span><span class="nav-text">關於我</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="categories">
                        <span class="nav-icon">📂</span><span class="nav-text">分類</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="archive">
                        <span class="nav-icon">📚</span><span class="nav-text">文章歸檔</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" data-page="contact">
                        <span class="nav-icon">📧</span><span class="nav-text">聯絡我</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- 主要內容 -->
        <main class="main-content">
            <!-- 首頁 -->
            <div id="home-page" style="display: block;">
                <header class="header">
                    <h1>歡迎來到我的部落格</h1>
                    <p>分享生活、技術與思考的美好時光</p>
                </header>
                <div class="page-container"> <!-- page-container for controls and grid -->
                    <div class="controls">
                        <div class="sort-controls">
                            <label>排序方式：</label>
                            <select id="sortSelect">
                                <option value="newest">最新到最舊</option>
                                <option value="oldest">最舊到最新</option>
                            </select>
                        </div>
                        <div class="filter-controls">
                            <label>篩選標籤：</label>
                            <button onclick="clearFilters()">顯示全部</button>
                        </div>
                        <div class="hashtag-filters" id="hashtagFilters"></div>
                    </div>
                    <div class="articles-grid" id="articlesGrid">
                        <div class="loading">載入文章中</div>
                    </div>
                </div>
            </div>

            <!-- 關於我頁面 -->
            <div id="about-page" style="display: none;">
                <header class="header"><h1 id="about-title">關於我</h1></header>
                <div class="page-container">
                    <div class="markdown-content" id="about-content"><div class="loading">載入內容中...</div></div>
                </div>
            </div>

            <!-- 分類頁面 -->
            <div id="categories-page" style="display: none;">
                <header class="header"><h1 id="categories-title">分類</h1></header>
                <div class="page-container">
                    <div id="categories-content"><div class="loading">載入分類中...</div></div>
                </div>
            </div>

            <!-- 文章歸檔頁面 -->
            <div id="archive-page" style="display: none;">
                <header class="header"><h1 id="archive-title">文章歸檔</h1></header>
                <div class="page-container">
                    <div id="archive-content"><div class="loading">載入歸檔中...</div></div>
                </div>
            </div>

            <!-- 聯絡我頁面 -->
            <div id="contact-page" style="display: none;">
                <header class="header"><h1 id="contact-title">聯絡我</h1></header>
                <div class="page-container">
                    <div class="markdown-content" id="contact-content"><div class="loading">載入內容中...</div></div>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.4.0/mermaid.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <script>
        let allData = { articles: [], pages: {} }; // Store all fetched data
        let articles = [];      // Will point to allData.articles
        let pagesContent = {};  // Will point to allData.pages
        let filteredArticles = [];
        let currentHashtag = '';
        
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'neutral',
            themeVariables: {
                primaryColor: '#f5f2eb', primaryTextColor: '#8b7355',
                primaryBorderColor: '#e6dcc9', lineColor: '#a0896b'
            }
        });
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            const toggleBtn = document.querySelector('.sidebar-toggle');
            toggleBtn.textContent = sidebar.classList.contains('collapsed') ? '→' : '←';
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                document.querySelectorAll('.main-content > div[id$="-page"]').forEach(page => {
                    page.style.display = 'none';
                });
                const articleDetailPage = document.getElementById('article-detail-page');
                if (articleDetailPage) articleDetailPage.remove();
                
                const pageId = this.dataset.page + '-page';
                const targetPage = document.getElementById(pageId);
                if (targetPage) {
                    targetPage.style.display = 'block';
                    window.scrollTo(0, 0); // Scroll to top when changing page
                    // Specific logic for each page type
                    if (pageId === 'home-page' && articles.length > 0) {
                        sortAndDisplayArticles(); 
                    } else if (pageId === 'about-page') {
                        renderStaticPage('about');
                    } else if (pageId === 'categories-page') {
                        renderCategoriesPage();
                    } else if (pageId === 'archive-page') {
                        renderArchivePage();
                    } else if (pageId === 'contact-page') {
                        renderStaticPage('contact');
                    }
                } else {
                    const homePage = document.getElementById('home-page');
                    if (homePage) homePage.style.display = 'block';
                }
            });
        });

        function markdownToHtml(markdown) {
            if (typeof markdown !== 'string' || !markdown) return '';
            let html = markdown;
            // Markdown parsing logic (use the robust version from previous answer)
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/gs, (match, lang, code) => {
                const language = lang || 'plaintext';
                return `<pre><code class="language-${language}">${escapeHtml(code.trim())}</code></pre>`;
            });
            html = html.replace(/^```mermaid\n([\s\S]*?)\n```$/gm, (match, diagram) => {
                const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                return `<div class="mermaid" id="${id}">${diagram.trim()}</div>`;
            });
            html = html.replace(/^###### (.*$)/gm, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            html = html.replace(/^(\*\*\*|---|\*\s\*\s\*)$/gm, '<hr>');
            // Basic list handling (for robust lists, use a library)
            html = html.replace(/^[\s]*([*+-]) +(.+)/gm, (match, bullet, item) => `<li>${item}</li>`);
            html = html.replace(/^(<li>.+<\/li>\s*)+/gm, (match) => `<ul>${match.replace(/<\/li>\s*<li>/g, '</li><li>')}</ul>`); // Combine li into ul

            html = html.replace(/^[\s]*(\d+)\. +(.+)/gm, (match, num, item) => `<li>${item}</li>`);
            // This OL regex needs more work if UL is processed first; order matters.
            // A simple OL wrapper, but might conflict if items are mixed.
            // html = html.replace(/^(<li>.+<\/li>\s*)+/gm, (match) => `<ol>${match.replace(/<\/li>\s*<li>/g, '</li><li>')}</ol>`);

            html = html.replace(/^> +(.*)/gm, (match, content) => `<blockquote><p>${content}</p></blockquote>`);
            html = html.replace(/<\/blockquote>\s*<blockquote>/g, '');
            html = html.split(/\n\s*\n/).map(paragraph => {
                const trimmed = paragraph.trim();
                if (!trimmed) return '';
                if (/^<\/?(h[1-6]|ul|ol|li|hr|blockquote|pre|div)/.test(trimmed)) {
                    return paragraph;
                }
                return `<p>${paragraph}</p>`;
            }).join('\n');
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            html = html.replace(/\*\*([^\s*](?:[^*]*[^\s*])?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^\s*](?:[^*]*[^\s*])?)\*/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            html = html.replace(/<p>\s*<\/(ul|ol|li|h[1-6]|hr|blockquote|pre|div)>/g, '</$1>');
            html = html.replace(/<(ul|ol|li|h[1-6]|hr|blockquote|pre|div)>\s*<\/p>/g, '<$1>');
            html = html.replace(/<p>\s*(<(?:h[1-6]|hr|ul|ol|blockquote|pre|div class="mermaid"))/g, '$1');
            html = html.replace(/(<\/(?:h[1-6]|hr|ul|ol|blockquote|pre|div)>)\s*<\/p>/g, '$1');
            html = html.replace(/<p>\s*<\/p>/g, '');
            return html;
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadData() { // Renamed from loadArticles to loadData
            const mainLoadingIndicator = document.querySelector('.main-content .loading') || document.getElementById('articlesGrid').querySelector('.loading');
            if(mainLoadingIndicator) mainLoadingIndicator.style.display = 'block';

            try {
                const gasUrl = 'https://script.google.com/macros/s/AKfycbxrM67dWveK91ty2SWHY_Fz55Vtyf76hVc1lywYMRrHKLY1lz-DdYdm8ivu6dRDb_jE/exec'; // ！！！替換成你的 GAS URL！！！
                if (gasUrl === 'YOUR_DEPLOYED_GAS_WEB_APP_URL_HERE') {
                    console.warn("提醒：請替換 YOUR_DEPLOYED_GAS_WEB_APP_URL_HERE");
                    throw new Error("GAS URL not configured.");
                }

                const response = await fetch(gasUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const fetchedData = await response.json();
                if (fetchedData.error) throw new Error(`GAS Error: ${fetchedData.error} - ${fetchedData.message || ''}`);
                
                allData = fetchedData; // Store all data
                articles = allData.articles.map(row => ({
                    title: row[0] || "無標題",
                    content: row[1] || "",
                    date: row[2] ? new Date(row[2]) : null,
                    image: row[3] || "https://images.unsplash.com/photo-1528605248644-14dd04022da1?w=400&h=200&fit=crop",
                    hashtags: row[4] && typeof row[4] === 'string' ? row[4].split(',').map(tag => tag.trim()).filter(tag => tag) : []
                })).filter(article => article.title !== "無標題" && article.date); // Filter out articles without title or date

                pagesContent = allData.pages || {}; // Assign pages data

                filteredArticles = [...articles];
                generateHashtagFilters();
                sortAndDisplayArticles(); // Display home page articles

                // Pre-render static pages if their content is available
                if(pagesContent.about) renderStaticPage('about');
                if(pagesContent.contact) renderStaticPage('contact');
                renderCategoriesPage(); // Categories are derived from articles
                renderArchivePage();    // Archive is derived from articles

                if (articles.length === 0 && !document.getElementById('article-detail-page')) {
                    document.getElementById('articlesGrid').innerHTML = '<div class="loading">目前沒有文章。</div>';
                }

            } catch (error) {
                console.error('載入資料失敗:', error);
                 if(mainLoadingIndicator) mainLoadingIndicator.innerHTML = `<div class="loading">載入資料失敗: ${error.message}<br>請檢查 Google Sheets 設定和 GAS URL。</div>`;
                // Optionally load sample data here if critical
                // loadSampleData(); 
            }
        }
        
        // --- 頁面渲染函數 ---
        function renderStaticPage(pageName) {
            const pageData = pagesContent[pageName];
            const titleElement = document.getElementById(`${pageName}-title`);
            const contentElement = document.getElementById(`${pageName}-content`);

            if (!contentElement) return;

            if (pageData) {
                if (titleElement) titleElement.textContent = pageData.title || pageName.charAt(0).toUpperCase() + pageName.slice(1);
                contentElement.innerHTML = markdownToHtml(pageData.content);
                // Re-initialize Mermaid/Prism if content was added
                setTimeout(() => {
                    if (typeof mermaid !== 'undefined' && typeof mermaid.run === 'function') {
                        mermaid.run({ nodes: contentElement.querySelectorAll('.mermaid') });
                    }
                    if (typeof Prism !== 'undefined') {
                        Prism.highlightAllUnder(contentElement);
                    }
                }, 100);
            } else {
                if (titleElement) titleElement.textContent = pageName.charAt(0).toUpperCase() + pageName.slice(1);
                contentElement.innerHTML = `<p>此頁面內容 (${pageName}) 尚未在 Google Sheets 中設定。</p>`;
            }
        }

        function renderCategoriesPage() {
            const contentElement = document.getElementById('categories-content');
            if (!contentElement) return;

            const allHashtags = new Set();
            articles.forEach(article => {
                if (Array.isArray(article.hashtags)) {
                    article.hashtags.forEach(tag => allHashtags.add(tag));
                }
            });

            if (allHashtags.size === 0) {
                contentElement.innerHTML = '<p>目前沒有分類標籤。</p>';
                return;
            }

            let html = '<ul class="categories-list">';
            allHashtags.forEach(tag => {
                // Clicking a category link should filter articles on the home page
                html += `<li><a href="#" class="category-link" data-hashtag="${escapeHtml(tag)}">#${escapeHtml(tag)}</a></li>`;
            });
            html += '</ul>';
            contentElement.innerHTML = html;

            // Add event listeners for category links
            contentElement.querySelectorAll('.category-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const hashtag = e.target.dataset.hashtag;
                    // Switch to home page and apply filter
                    document.querySelector('.nav-link[data-page="home"]').click(); // Simulate click
                    // Wait for home page to render then apply filter
                    setTimeout(() => {
                         filterByHashtag(hashtag, true); // Pass true to activate the button
                    }, 100);
                });
            });
        }
        
        function renderArchivePage() {
            const contentElement = document.getElementById('archive-content');
            if (!contentElement) return;

            if (articles.length === 0) {
                contentElement.innerHTML = '<p>目前沒有文章可供歸檔。</p>';
                return;
            }

            const articlesByYearMonth = {};
            articles.sort((a, b) => b.date.getTime() - a.date.getTime()) // Sort newest first for archive display
                   .forEach(article => {
                const year = article.date.getFullYear();
                const month = article.date.getMonth(); // 0-11
                if (!articlesByYearMonth[year]) {
                    articlesByYearMonth[year] = {};
                }
                if (!articlesByYearMonth[year][month]) {
                    articlesByYearMonth[year][month] = [];
                }
                articlesByYearMonth[year][month].push(article);
            });

            let html = '<ul class="archive-list">';
            const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];

            Object.keys(articlesByYearMonth).sort((a, b) => b - a).forEach(year => { // Sort years descending
                html += `<li class="archive-year">${year}</li>`;
                Object.keys(articlesByYearMonth[year]).sort((a, b) => b - a).forEach(monthIndex => { // Sort months descending
                    html += `<li class="archive-month">${monthNames[parseInt(monthIndex)]}</li>`;
                    articlesByYearMonth[year][monthIndex].forEach(article => {
                        const articleDateStr = article.date.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });
                        // Clicking an archive link should open the article
                        html += `<li><span class="archive-date">${articleDateStr}</span> <a href="#" class="archive-link" data-article='${escapeHtml(JSON.stringify(article))}'>${escapeHtml(article.title)}</a></li>`;
                    });
                });
            });
            html += '</ul>';
            contentElement.innerHTML = html;

            // Add event listeners for archive links
            contentElement.querySelectorAll('.archive-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    try {
                        const articleData = JSON.parse(e.target.dataset.article);
                        // Convert date string back to Date object if necessary
                        if(articleData.date && typeof articleData.date === 'string') {
                            articleData.date = new Date(articleData.date);
                        }
                        openArticle(articleData);
                    } catch (err) {
                        console.error("Error parsing article data from archive link:", err);
                    }
                });
            });
        }


        // --- 文章列表相關函數 (Home page) ---
        function generateHashtagFilters() {
            const allHashtags = new Set();
            articles.forEach(article => {
                if (Array.isArray(article.hashtags)) {
                    article.hashtags.forEach(tag => allHashtags.add(tag));
                }
            });
            const filtersContainer = document.getElementById('hashtagFilters');
            if (!filtersContainer) return;
            filtersContainer.innerHTML = '';
            allHashtags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'hashtag-btn';
                btn.textContent = `#${tag}`;
                btn.onclick = () => filterByHashtag(tag);
                filtersContainer.appendChild(btn);
            });
        }

        function filterByHashtag(hashtag, activateButton = false) { // Added activateButton param
            if (activateButton) {
                currentHashtag = hashtag; // Force set if coming from categories page
            } else {
                currentHashtag = currentHashtag === hashtag ? '' : hashtag;
            }
            
            document.querySelectorAll('.hashtag-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === `#${hashtag}` && currentHashtag === hashtag);
            });
            
            if (currentHashtag) {
                filteredArticles = articles.filter(article => 
                    Array.isArray(article.hashtags) && article.hashtags.includes(currentHashtag)
                );
            } else {
                filteredArticles = [...articles];
            }
            sortAndDisplayArticles();
        }

        function clearFilters() {
            currentHashtag = '';
            filteredArticles = [...articles];
            document.querySelectorAll('.hashtag-btn').forEach(btn => btn.classList.remove('active'));
            sortAndDisplayArticles();
        }

        function sortAndDisplayArticles() {
            const sortSelect = document.getElementById('sortSelect');
            if (!sortSelect) return;
            const sortBy = sortSelect.value;
            
            filteredArticles.sort((a, b) => {
                if (!a.date || !b.date) return 0; // Handle null dates
                return sortBy === 'newest' ? b.date.getTime() - a.date.getTime() : a.date.getTime() - b.date.getTime();
            });
            displayArticles();
        }

        function displayArticles() {
            const grid = document.getElementById('articlesGrid');
            if (!grid) return;
            grid.innerHTML = ''; 
            if (filteredArticles.length === 0) {
                grid.innerHTML = '<div class="loading">沒有找到相關文章</div>';
                return;
            }
            filteredArticles.forEach(article => {
                const plainTextContent = (article.content || "").replace(/[#*`>\-\[\]()!]/g, '').replace(/\n/g, ' ').trim();
                const preview = plainTextContent.length > 100 ? plainTextContent.substring(0, 100) + '...' : plainTextContent;
                const displayDate = article.date instanceof Date && !isNaN(article.date)
                                    ? article.date.toLocaleDateString('zh-TW') : '日期未知';
                const articleCard = document.createElement('article');
                articleCard.className = 'article-card';
                articleCard.innerHTML = `
                    <img src="${article.image || 'https://via.placeholder.com/400x200.png?text=No+Image'}" alt="${escapeHtml(article.title)}" class="article-image">
                    <div class="article-content">
                        <h3 class="article-title">${escapeHtml(article.title)}</h3>
                        <div class="article-date">${displayDate}</div>
                        <p class="article-preview">${escapeHtml(preview)}</p>
                        <div class="article-tags">
                            ${(article.hashtags || []).map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    </div>
                `;
                articleCard.addEventListener('click', () => openArticle(article));
                grid.appendChild(articleCard);
            });
        }
        
        function openArticle(article) {
            const renderedContent = markdownToHtml(article.content);
            const displayDate = article.date instanceof Date && !isNaN(article.date)
                                ? article.date.toLocaleDateString('zh-TW') : '日期未知';
            const articlePageId = 'article-detail-page';
            let articlePage = document.getElementById(articlePageId);
            if (articlePage) articlePage.remove(); 
            articlePage = document.createElement('div');
            articlePage.id = articlePageId; 
            articlePage.style.display = 'block'; 
            articlePage.innerHTML = `
                <header class="header">
                    <button onclick="closeArticle()" style="float: right; background: transparent; border: none; font-size: 1.5rem; cursor: pointer; color: #8b7355; padding: 0.5rem 1rem; line-height: 1;">✕</button>
                    <h1>${escapeHtml(article.title)}</h1>
                    <p>發布於 ${displayDate}</p>
                    <div style="text-align: center; margin-top: 1rem;">
                        ${(article.hashtags || []).map(tag => `<span class="tag" style="margin: 0 0.2rem;">#${escapeHtml(tag)}</span>`).join('')}
                    </div>
                </header>
                <div class="page-container">
                    <div class="markdown-content">${renderedContent}</div>
                </div>`;
            document.querySelectorAll('.main-content > div[id$="-page"]').forEach(page => page.style.display = 'none');
            document.querySelector('.main-content').appendChild(articlePage);
            window.scrollTo(0, 0); 
            setTimeout(() => {
                if (typeof mermaid !== 'undefined' && typeof mermaid.run === 'function') {
                     mermaid.run({ nodes: articlePage.querySelectorAll('.mermaid') });
                }
                if (typeof Prism !== 'undefined') Prism.highlightAllUnder(articlePage);
            }, 100);
        }

        function closeArticle() {
            const articlePage = document.getElementById('article-detail-page');
            if (articlePage) articlePage.remove();
            const homePage = document.getElementById('home-page');
            if (homePage) homePage.style.display = 'block';
            if (articles.length > 0) sortAndDisplayArticles();
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const homeLink = document.querySelector('.nav-link[data-page="home"]');
            if (homeLink) homeLink.classList.add('active');
        }

        const sortSelectElement = document.getElementById('sortSelect');
        if (sortSelectElement) {
            sortSelectElement.addEventListener('change', sortAndDisplayArticles);
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadData(); // Load all data initially
            const initialActiveLink = document.querySelector('.nav-link[data-page="home"]');
            if(initialActiveLink) initialActiveLink.classList.add('active');
            const homePage = document.getElementById('home-page');
            if(homePage) homePage.style.display = 'block';
        });
    </script>
</body>
</html>
