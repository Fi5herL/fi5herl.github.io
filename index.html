<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fi5herL 個人網站 — 新版入口頁">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎣</text></svg>">
  <title>Fi5herL 個人網站</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto,
                   'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei',
                   sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .card {
      max-width: 560px;
      width: 100%;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    .emoji { font-size: 3rem; line-height: 1; margin-bottom: 1rem; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .badge {
      display: inline-block;
      background: #f0f0f0;
      color: #555;
      font-size: 0.78rem;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    p {
      color: #444;
      font-size: 0.97rem;
      margin-bottom: 1.25rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #ececec;
      margin: 1.5rem 0;
    }

    .old-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.9rem;
      color: #333;
      text-decoration: none;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 0.45rem 1rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .old-link:hover {
      background: #f5f5f5;
      border-color: #aaa;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎣</div>
    <h1>Fi5herL 個人網站</h1>
    <span class="badge">新版發布入口</span>

    <p>
      歡迎來到 Fi5herL 的個人網站。<br>
      這是全新的發布入口頁，內容持續更新中。
    </p>

    <p>
      本站以 GitHub Pages 靜態部署，致力於分享技術筆記、閱讀心得與個人專案。
    </p>

    <hr class="divider">

    <p style="margin-bottom:0.75rem; font-size:0.88rem; color:#666;">
      想瀏覽舊版首頁？
    </p>
    <a class="old-link" href="./index_old.html">
      ← 前往舊版首頁
    </a>
  </div>

  <footer>© Fi5herL · fi5herl.github.io</footer>
</body>
</html>
