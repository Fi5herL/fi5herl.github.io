<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacing Calculator (for UL 60730-1)</title>
    <style>

        h1 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        .container { background-color: #ffffff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        select, input[type='number'], button { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        input[type='radio'] { margin-right: 8px; }
        .radio-group label { display: inline-block; margin-right: 20px; font-weight: normal; }
        .radio-group .case-note { font-size: 0.9em; color: #555; margin-left: 5px; }
        
        .form-row { display: flex; flex-wrap: wrap; gap: 20px; }
        .form-row > .form-group { flex: 1; min-width: 200px; }
        
        button { background-color: #007bff; color: white; border: none; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        
        .result-area { margin-top: 25px; }
        .result-table-container { padding: 20px; background-color: #fff; border: 1px solid #ddd; border-radius: 5px; display: none; overflow-x: auto; margin-bottom: 20px; }
        .result-summary { margin-bottom: 20px; font-size: 1.1em; text-align: center; }
        .error { color: #D8000C; background-color: #FFD2D2; padding: 10px; border-radius: 5px; margin-top: 15px; display: none; }
        .fallback-note { font-size: 0.9em; color: #c00; margin-top: 10px; }

        .result-table { width: 100%; border-collapse: collapse; font-size: 11px; border: 1px solid black; }
        .result-table th, .result-table td { border: 1px solid black; padding: 5px; text-align: center; vertical-align: top; }
        .result-table thead th { font-weight: bold; background-color: #f2f2f2; }
        
        .highlight-row { background-color: #e9f5ff !important; }
        .highlight-cell { background-color: #007bff !important; color: white !important; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Spacing Calculator (for UL 60730-1)</h1>
        
        <div class="form-group radio-group">
            <label><input type="radio" name="inputType" value="system" onchange="toggleInputType()" checked> Declare by Power System</label>
            <label><input type="radio" name="inputType" value="ln_direct" onchange="toggleInputType()"> Enter Line-to-Neutral Voltage Directly</label>
        </div>

        <div id="systemInputs">
            <div class="form-row">
                <div class="form-group">
                    <label for="powerSystemSelect">Power System (from Standard):</label>
                    <select id="powerSystemSelect" onchange="updateNominalVoltageOptions()"></select>
                </div>
                <div class="form-group">
                    <label for="nominalVoltageSelect">Nominal Voltage System:</label>
                    <select id="nominalVoltageSelect"></select>
                </div>
            </div>
        </div>

        <div id="lnDirectInput" style="display: none;">
             <div class="form-group">
                <label for="lnVoltage">Line-to-Neutral Voltage (V):</label>
                <input type="number" id="lnVoltage" placeholder="e.g., 150, 300">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="workingVoltage">Rated voltage (V) for Basic Insulation Creepage:</label>
                <input type="number" id="workingVoltage" placeholder="e.g., 250">
            </div>
            <div class="form-group">
                <label for="workingVoltageRms">Working Voltage (V r.m.s.) for Functional Insulation:</label>
                <input type="number" id="workingVoltageRms" placeholder="e.g., 50">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="overvoltageCategory">Overvoltage Category:</label>
                <select id="overvoltageCategory"><option value="I">I</option><option value="II">II</option><option value="III">III</option><option value="IV">IV</option></select>
            </div>
            <div class="form-group">
                <label for="pollutionDegree">Pollution Degree:</label>
                <select id="pollutionDegree"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
            </div>
             <div class="form-group">
                <label for="materialGroupSelect">Material Group:</label>
                <select id="materialGroupSelect">
                    <option value="I">Group I (PTI/CTI ≥ 600; CTI Index 0)</option>
                    <option value="II">Group II (400 ≤ PTI/CTI &lt; 600; CTI Index 1)</option>
                    <option value="IIIa">Group IIIa (175 ≤ PTI/CTI &lt; 400; CTI Index 2, 3)</option>
                    <option value="IIIb">Group IIIb (100 ≤ PTI/CTI &lt; 175; CTI Index 4)</option>
                </select>
            </div>
			<div class="form-group">
				<label for="altitudeSelect">Altitude (sea level):</label>
				<select id="altitudeSelect">
					<option value="0">≤ 2000 (Standard condition)</option>
					<option value="2000" selected>2000 (No correction)</option>
					<option value="3000">3000 (Factor: 1.14)</option>
					<option value="4000">4000 (Factor: 1.29)</option>
					<option value="5000">5000 (Factor: 1.48)</option>
					<option value="6000">6000 (Factor: 1.70)</option>
					<option value="7000">7000 (Factor: 1.95)</option>
					<option value="8000">8000 (Factor: 2.25)</option>
					<option value="9000">9000 (Factor: 2.62)</option>
					<option value="10000">10000 (Factor: 3.02)</option>
					<option value="15000">15000 (Factor: 6.67)</option>
					<option value="20000">20000 (Factor: 14.5)</option>
				</select>
			</div>
        </div>
        
        <div class="form-group radio-group">
            <label>Clearance Case:</label>
            <label><input type="radio" name="clearanceCase" value="A" checked> Case A <span class="case-note">(Inhomogeneous Field)</span></label>
            <label><input type="radio" name="clearanceCase" value="B"> Case B <span class="case-note">(Homogeneous Field)</span></label>
        </div>

        <div class="form-group radio-group">
            <label>Application Type for Creepage:</label>
            <label><input type="radio" name="applicationType" value="pcb" checked> Printed Wiring Material (PCB)</label>
            <label><input type="radio" name="applicationType" value="plastic"> Plastic Material</label>
        </div>

        <button onclick="runCalculation()">Calculate</button>
        <div id="error-message" class="error"></div>
    </div>

    // --- Helper & Calculation Functions ---
    function formatImpulseVoltageKey(value) { const num = Number(value); return num < 1 ? num.toFixed(2) : num.toFixed(1); }
    function findTableRow(tableId, ln_voltage) { const tableData = impulseData[tableId]; const max_ln = tableData[tableData.length - 1].ln; if (ln_voltage <= 0 || ln_voltage > max_ln) return null; for (const row of tableData) { if (ln_voltage <= row.ln) return row; } return null; }
    function findClearanceRow(impulseVoltage) { const impulsekV = impulseVoltage / 1000; const clearanceKeys = Object.keys(clearanceData).map(Number).sort((a, b) => a - b); for (const key of clearanceKeys) { if (impulsekV <= Number(key)) return { data: clearanceData[key], key: formatImpulseVoltageKey(key) }; } return null; }

		const altitudeKeys = Object.keys(altitudeCorrectionFactors).map(Number).sort((a, b) => a - b);
		
		// 找到對應的海拔等級
		for (const key of altitudeKeys) {
			if (altitude <= key) {
				const factor = altitudeCorrectionFactors[key];
				const note = `<span style="font-size: 0.9em; color: #c00;">Note: Clearance values corrected for altitude ${altitude}m (correction factor: ${factor}).</span>`;
				return { factor, note };
			}
		}
		
		// 如果超過最高海拔，使用最高的修正係數
		const maxFactor = altitudeCorrectionFactors[20000];
		const note = `<span style="font-size: 0.9em; color: #c00;">Note: Clearance values corrected for altitude ${altitude}m (correction factor: ${maxFactor}, extrapolated from maximum table value).</span>`;
		return { factor: maxFactor, note };
	}
	function findGenericVoltageTier(voltage, dataObject) { const voltageKeys = Object.keys(dataObject).map(Number).sort((a, b) => a - b); let selectedTier = null; for (const key of voltageKeys) { if (voltage <= key) { selectedTier = key; break; } } if (selectedTier === null && voltage > 0) { selectedTier = voltageKeys[voltageKeys.length - 1]; } return selectedTier; }
    function findCreepageValue(applicationType, ratedVoltage, pollutionDegree, materialGroup) { const voltageTier = findGenericVoltageTier(ratedVoltage, creepageData); if (!voltageTier) return null; return processCreepageLogic(applicationType, voltageTier, pollutionDegree, materialGroup, creepageData); }
    function findFunctionalCreepageValue(applicationType, workingVoltage, pollutionDegree, materialGroup) { const voltageTier = findGenericVoltageTier(workingVoltage, functionalCreepageData); if (!voltageTier) return null; return processCreepageLogic(applicationType, voltageTier, pollutionDegree, materialGroup, functionalCreepageData); }
    function processCreepageLogic(applicationType, voltageTier, pollutionDegree, materialGroup, dataObject) { if (materialGroup === 'IIIb' && (voltageTier > 630 || pollutionDegree === '4')) { throw new Error("Material Group IIIb is not permitted for applications > 630V or in Pollution Degree 4."); } const rowData = dataObject[voltageTier]; let value = null; let highlightInfo = { type: applicationType, pd: pollutionDegree, mg: materialGroup }; let fallbackMessage = null; if (applicationType === 'pcb') { if (pollutionDegree === '1') { value = rowData.pcb['1']; } else if (pollutionDegree === '2') { if (materialGroup === 'IIIb') { value = rowData.plastic['2'][materialGroup]; highlightInfo.type = 'plastic'; fallbackMessage = `<b>Note:</b> Fallback to Plastic Material value applied. Material Group IIIb is not applicable for PCB in Pollution Degree 2.`; } else { value = rowData.pcb['2']; } } else { value = rowData.plastic[pollutionDegree][materialGroup]; highlightInfo.type = 'plastic'; fallbackMessage = `<b>Note:</b> Fallback to Plastic Material value applied. PCB-specific values are only defined for Pollution Degrees 1 and 2.`; } } else { if (pollutionDegree === '1') { value = rowData.plastic['1'].all; highlightInfo.mg = 'all'; } else { value = rowData.plastic[pollutionDegree][materialGroup]; } } return { value, highlightInfo, fallbackMessage }; }
    
    // --- UI Control ---
    function populatePowerSystems() { const select = document.getElementById('powerSystemSelect'); select.innerHTML = ''; for (const key in powerSystems) { const option = document.createElement('option'); option.value = key; option.textContent = powerSystems[key].displayName; select.appendChild(option); } }
    function updateNominalVoltageOptions() { const systemKey = document.getElementById('powerSystemSelect').value; const system = powerSystems[systemKey]; const select = document.getElementById('nominalVoltageSelect'); select.innerHTML = ''; system.validVoltages.forEach(v => { const option = document.createElement('option'); option.value = v.value; option.textContent = v.text; select.appendChild(option); }); }
    function toggleInputType() { const inputType = document.querySelector('input[name="inputType"]:checked').value; document.getElementById('systemInputs').style.display = (inputType === 'system') ? 'block' : 'none'; document.getElementById('lnDirectInput').style.display = (inputType === 'system') ? 'none' : 'block'; }

    // --- Main Calculation Runner ---
	function runCalculation() {
		document.getElementById('error-message').style.display = 'none';
		['21', 'k1', '22', '23', '24'].forEach(id => { 
			const container = document.getElementById(`result-table-${id}-container`); 
			if (container) container.style.display = 'none'; 
		});
		document.querySelectorAll('.result-table tbody tr').forEach(r => r.classList.remove('highlight-row'));
		document.querySelectorAll('.result-table tbody td').forEach(c => c.classList.remove('highlight-cell'));

		try {
			const inputType = document.querySelector('input[name="inputType"]:checked').value;
			const ovc = document.getElementById('overvoltageCategory').value;
			const pollutionDegree = document.getElementById('pollutionDegree').value;
			const clearanceCase = document.querySelector('input[name="clearanceCase"]:checked').value;
			const applicationType = document.querySelector('input[name="applicationType"]:checked').value;
			const materialGroup = document.getElementById('materialGroupSelect').value;
			const altitude = parseFloat(document.getElementById('altitudeSelect').value) || 0;

			// --- Impulse & Clearance Calculation ---
			let tableId, ln_voltage, tableRow, selectedSystemText;
			if (inputType === 'system') { 
				const systemKey = document.getElementById('powerSystemSelect').value; 
				tableId = powerSystems[systemKey].tableId; 
				ln_voltage = parseFloat(document.getElementById('nominalVoltageSelect').value); 
				selectedSystemText = document.getElementById('nominalVoltageSelect').options[document.getElementById('nominalVoltageSelect').selectedIndex].text; 
			} else { 
				ln_voltage = parseFloat(document.getElementById('lnVoltage').value); 
				if (isNaN(ln_voltage)) throw new Error('Please enter a valid Line-to-Neutral Voltage.'); 
				tableId = (ln_voltage > 600) ? 'k1' : '21'; 
				selectedSystemText = `Direct Input: ${ln_voltage}V`; 
			}
			
			tableRow = findTableRow(tableId, ln_voltage);
			if (!tableRow) { 
				throw new Error(`The L-N Voltage (${ln_voltage.toFixed(1)} V) is outside the defined range.`); 
			}
			
			const impulseVoltage = tableRow[ovc];
			const impulseContainer = document.getElementById(`result-table-${tableId}-container`);
			impulseContainer.querySelector('.result-summary').innerHTML = `For system <b>${selectedSystemText}</b> (L-N Tier: <b>${tableRow.ln}V</b>), Category <b>${ovc}</b> requires <b>${impulseVoltage} V</b>.`;
			impulseContainer.style.display = 'block';
			
			const targetImpulseRow = impulseContainer.querySelector(`tbody tr[data-ln-value="${tableRow.ln}"]`);
			if (targetImpulseRow) { 
				targetImpulseRow.classList.add('highlight-row'); 
				const cell = targetImpulseRow.querySelector(`td[data-ovc="${ovc}"]`); 
				if(cell) cell.classList.add('highlight-cell'); 
			}
			
			const clearanceRowData = findClearanceRow(impulseVoltage);
			if (!clearanceRowData) { 
				throw new Error(`Rated Impulse Voltage (${impulseVoltage} V) is outside the range for clearances.`); 
			}
			
			const clearanceContainer = document.getElementById('result-table-22-container');
			const basicClearanceCell = clearanceContainer.querySelector(`tbody tr[data-impulse-voltage="${clearanceRowData.key}"] td[data-case="${clearanceCase}"][data-pd="${pollutionDegree}"]`);
			if (!basicClearanceCell) throw new Error("Could not locate the basic clearance cell in the DOM.");
			
			// 獲取原始間隙距離值並應用海拔修正
			const originalBasicClearance = parseFloat(basicClearanceCell.textContent);
			const altitudeCorrection = getAltitudeCorrectionFactor(altitude);
			const correctedBasicClearance = (originalBasicClearance * altitudeCorrection.factor).toFixed(2).replace(/\.00$/, '').replace(/\.([1-9])0$/, '.$1');
			
			basicClearanceCell.classList.add('highlight-cell');
			basicClearanceCell.parentElement.classList.add('highlight-row');

			let clearanceSummaryHTML = `For Rated Impulse Voltage <b>${impulseVoltage} V</b>, Case <b>${clearanceCase}</b>, and PD <b>${pollutionDegree}</b>: <br>Clearance (Basic Insulation) is <b>${correctedBasicClearance} mm</b>`;
			
			if (altitude > 2000) {
				clearanceSummaryHTML += ` (original: ${originalBasicClearance} mm, corrected for ${altitude}m altitude)`;
			}
			clearanceSummaryHTML += `.`;
			
			const nextRow = basicClearanceCell.parentElement.nextElementSibling;
			let correctedReinforcedClearance = null;
			if (nextRow) {
				const reinforcedCell = nextRow.querySelector(`td[data-case="A"][data-pd="${pollutionDegree}"]`);
				const nextImpulseTier = nextRow.firstElementChild.textContent;
				const originalReinforcedClearance = parseFloat(reinforcedCell.textContent);
				correctedReinforcedClearance = (originalReinforcedClearance * altitudeCorrection.factor).toFixed(2).replace(/\.00$/, '').replace(/\.([1-9])0$/, '.$1');
				
				clearanceSummaryHTML += `<br>Clearance (Reinforced Insulation) is <b>${correctedReinforcedClearance} mm</b>`;
				if (altitude > 2000) {
					clearanceSummaryHTML += ` (original: ${originalReinforcedClearance} mm, corrected for ${altitude}m altitude)`;
				}
				clearanceSummaryHTML += ` (evaluated at next impulse tier: ${nextImpulseTier} kV, Case A).`;
			} else {
				clearanceSummaryHTML += `<br>Clearance (Reinforced Insulation) cannot be determined as it's the highest impulse tier.`;
			}
			
			// 添加海拔修正註釋
			if (altitudeCorrection.note) {
				clearanceSummaryHTML += `<br><div class="fallback-note">${altitudeCorrection.note}</div>`;
			}
			
			clearanceContainer.querySelector('.result-summary').innerHTML = clearanceSummaryHTML;
			clearanceContainer.style.display = 'block';

			// --- Basic Insulation Creepage Calculation (修改後包含間隙距離比較) ---
			const ratedVoltage = parseFloat(document.getElementById('workingVoltage').value);
			if (!isNaN(ratedVoltage) && ratedVoltage > 0) {
				const result = findCreepageValue(applicationType, ratedVoltage, pollutionDegree, materialGroup);
				if (!result) throw new Error(`Could not determine Basic Creepage value.`);
				
				// 使用修正後的間隙距離進行比較
				const correctedBasicClearanceValue = parseFloat(correctedBasicClearance);
				let finalBasicCreepageValue = result.value;
				let basicCreepageNote = "";
				
				// 比較 Corrected Clearance BI vs Creepage BI
				if (correctedBasicClearanceValue > result.value) {
					finalBasicCreepageValue = correctedBasicClearanceValue;
					basicCreepageNote = `<span style="font-size: 0.9em; color: #c00;">Note: Basic Insulation Creepage distance replaced by Clearance distance (${correctedBasicClearance} mm) as Clearance > Creepage.</span>`;
				}
				
				// 計算加強絕緣爬電距離
				const reinforcedCreepageValue = (result.value * 2);
				
				// 獲取修正後的加強絕緣間隙距離值進行比較
				let finalReinforcedCreepageValue = reinforcedCreepageValue;
				let reinforcedCreepageNote = "";
				
				if (correctedReinforcedClearance !== null) {
					const correctedReinforcedClearanceValue = parseFloat(correctedReinforcedClearance);
					
					// 比較 Corrected Clearance RI vs Creepage RI
					if (correctedReinforcedClearanceValue > reinforcedCreepageValue) {
						finalReinforcedCreepageValue = correctedReinforcedClearanceValue;
						reinforcedCreepageNote = `<span style="font-size: 0.9em; color: #c00;">Note: Reinforced Insulation Creepage distance replaced by Clearance distance (${correctedReinforcedClearance} mm) as Clearance > Creepage.</span>`;
					}
				}
				
				// 格式化最終的加強絕緣爬電距離值
				const finalReinforcedCreepageValueStr = finalReinforcedCreepageValue.toFixed(2).replace(/\.00$/, '').replace(/\.([1-9])0$/, '.$1');
				
				const creepageContainer = document.getElementById('result-table-23-container');
				let summaryHTML = `For Rated Voltage <b>${ratedVoltage} V</b> (App: <b>${applicationType.toUpperCase()}</b>), PD <b>${pollutionDegree}</b>, MG <b>${materialGroup}</b>:<br>`;
				summaryHTML += `Creepage (Basic Insulation) is <b>${finalBasicCreepageValue} mm</b>. <br>`;
				summaryHTML += `Creepage (Reinforced Insulation) is <b>${finalReinforcedCreepageValueStr} mm</b>.`;
				
				// 添加回退訊息（如果有）
				if (result.fallbackMessage) {
					summaryHTML += `<div class="fallback-note">${result.fallbackMessage}</div>`;
				}
				
				// 添加間隙距離替換註釋（如果有）
				if (basicCreepageNote) {
					summaryHTML += `<div class="fallback-note">${basicCreepageNote}</div>`;
				}
				if (reinforcedCreepageNote) {
					summaryHTML += `<div class="fallback-note">${reinforcedCreepageNote}</div>`;
				}
				
				creepageContainer.querySelector('.result-summary').innerHTML = summaryHTML;
				creepageContainer.style.display = 'block';
				const voltageTier = findGenericVoltageTier(ratedVoltage, creepageData);
				highlightCell(creepageContainer, voltageTier, result.highlightInfo);
			}

			// --- Functional Insulation Creepage Calculation (修改後包含間隙距離比較) ---
			const workingVoltageRms = parseFloat(document.getElementById('workingVoltageRms').value);
			if (!isNaN(workingVoltageRms) && workingVoltageRms > 0) {
				const result = findFunctionalCreepageValue(applicationType, workingVoltageRms, pollutionDegree, materialGroup);
				if (!result) throw new Error(`Could not determine Functional Creepage value.`);
				
				// 功能絕緣只需要與修正後的基本絕緣間隙距離比較
				const correctedBasicClearanceValue = parseFloat(correctedBasicClearance);
				let finalFunctionalCreepageValue = result.value;
				let functionalCreepageNote = "";
				
				// 比較 Corrected Clearance BI vs Functional Creepage
				if (correctedBasicClearanceValue > result.value) {
					finalFunctionalCreepageValue = correctedBasicClearanceValue;
					functionalCreepageNote = `<span style="font-size: 0.9em; color: #c00;">Note: Functional Insulation Creepage distance replaced by Basic Insulation Clearance distance (${correctedBasicClearance} mm) as Clearance > Creepage.</span>`;
				}
				
				const creepageContainer = document.getElementById('result-table-24-container');
				let summaryHTML = `For <b>Functional Insulation</b> at Working Voltage <b>${workingVoltageRms} V r.m.s</b> (App: <b>${applicationType.toUpperCase()}</b>), PD <b>${pollutionDegree}</b>, MG <b>${materialGroup}</b>, the Creepage is <b>${finalFunctionalCreepageValue} mm</b>.`;
				
				// 添加回退訊息（如果有）
				if (result.fallbackMessage) {
					summaryHTML += `<div class="fallback-note">${result.fallbackMessage}</div>`;
				}
				
				// 添加間隙距離替換註釋（如果有）
				if (functionalCreepageNote) {
					summaryHTML += `<div class="fallback-note">${functionalCreepageNote}</div>`;
				}
				
				creepageContainer.querySelector('.result-summary').innerHTML = summaryHTML;
				creepageContainer.style.display = 'block';
				const voltageTier = findGenericVoltageTier(workingVoltageRms, functionalCreepageData);
				highlightCell(creepageContainer, voltageTier, result.highlightInfo);
			}

		} catch (e) {
			document.getElementById('error-message').textContent = e.message;
			document.getElementById('error-message').style.display = 'block';
		}
	}

    function highlightCell(container, voltageTier, highlightInfo) {
        if (!voltageTier) return;
        const targetRow = container.querySelector(`tbody tr[data-voltage="${voltageTier}"]`);
        if (targetRow) {
            targetRow.classList.add('highlight-row');
            let selector;
            if (highlightInfo.type === 'pcb') {
                selector = `td[data-type="pcb"][data-pd="${highlightInfo.pd}"]`;
            } else {
                const displayMG = (highlightInfo.mg === 'all') ? 'all' : ((highlightInfo.mg === 'IIIa' || highlightInfo.mg === 'IIIb') ? 'III' : highlightInfo.mg);
                selector = `td[data-type="plastic"][data-pd="${highlightInfo.pd}"][data-mg="${displayMG}"]`;
            }
            const targetCell = targetRow.querySelector(selector);
            if (targetCell) targetCell.classList.add('highlight-cell');
        }
    }

    function generateTableHTML(dataObject) {

            tbodyHTML += `<tr data-voltage="${voltage}">`;
            tbodyHTML += `<td>${voltage}</td>`; // Voltage Column

            tbodyHTML += `<td data-type="pcb" data-pd="2">${row.pcb['2']}</td>`;
            tbodyHTML += `<td data-type="plastic" data-pd="1" data-mg="all">${row.plastic['1'].all}</td>`;

                tbodyHTML += `<td data-type="plastic" data-pd="${pd}" data-mg="II">${row.plastic[pd].II}</td>`;
                tbodyHTML += `<td data-type="plastic" data-pd="${pd}" data-mg="III">${row.plastic[pd].IIIa}</td>`;
            });
            tbodyHTML += `</tr>`;
        }
        return tbodyHTML;
    }
