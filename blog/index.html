<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="google-site-verification" content="_S5OqP7e0fZyveRIAilFubPR5igGnHOS7oFXhDOTPe4" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fi5her Blog - Tech & Life share 分享生活技巧、科技知識和個人想法。在這裡你可以找到關於生活、科技、程式設計等方面的文章。">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎣</text></svg>">
    <title>Fi5her Blog</title>
    <style>
        /* Tech Blogger Theme CSS - Embedded */
        /* Global Variables */
        :root {
            --font-body: 'Roboto', 'Open Sans', 'Helvetica Neue', sans-serif;
            --font-heading: 'Montserrat', 'Roboto', sans-serif;

            --color-bg-body: #f4f7f9;
            --color-bg-sidebar: #2c3e50; /* Dark slate blue/charcoal */
            --color-bg-card: #ffffff;
            --color-bg-header-page: #ffffff;
            --color-bg-controls: #fdfdfd;

            --color-text-primary: #34495e; /* Dark grayish blue for body text */
            --color-text-secondary: #7f8c8d; /* Medium gray for less important text */
            --color-text-on-dark: #ecf0f1; /* Light gray/off-white for text on dark bg */
            --color-text-heading: #2c3e50; /* Darker for headings */

            --color-accent: #3498db;          /* Bright blue */
            --color-accent-hover: #2980b9;    /* Darker blue for hover */
            --color-tag-bg: rgba(52, 152, 219, 0.1); /* Light accent for tag bg */
            --color-tag-text: var(--color-accent);

            --color-border: #e0e6ed;          /* Light border color */
            --color-shadow: rgba(44, 62, 80, 0.15); /* Subtle shadow */

            --border-radius-sm: 6px;
            --border-radius-md: 12px;
            --border-radius-lg: 20px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap');

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth; /* For smooth anchor scrolling */
        }

        body {
            font-family: var(--font-body);
            background: var(--color-bg-body);
            color: var(--color-text-primary);
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Loading Animation Styles */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-bg-sidebar); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; 
            color: var(--color-text-on-dark);
            font-family: var(--font-body);
            transition: opacity 0.5s ease-out; 
            opacity: 1; /* Start visible */
        }

        #loadingAnimation {
            font-size: 1.5rem; 
            line-height: 1.2;
            text-align: center;
            white-space: pre; 
            margin-bottom: 1.5rem;
            min-height: 200px; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-accent); /* Fish color */
        }

        #loadingText {
            font-size: 1.2rem;
            font-weight: 500;
        }

        #loadingOverlay.hidden {
            opacity: 0;
            pointer-events: none; 
        }


        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--color-bg-sidebar);
            color: var(--color-text-on-dark);
            padding: 1.5rem 1rem;
            transition: width 0.3s ease;
            position: relative;
            box-shadow: 3px 0 15px var(--color-shadow);
            display: flex;
            flex-direction: column;
        }

        .sidebar.collapsed {
            width: 70px;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .sidebar-toggle {
            position: absolute;
            top: 1.5rem;
            right: -18px; 
            background: transparent; 
            border: none; 
            border-radius: 50%;
            width: 36px; 
            height: 36px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px; 
            color: var(--color-text-on-dark); 
            transition: all 0.3s ease;
            box-shadow: none; 
            z-index: 10;
        }

        .sidebar-toggle:hover {
            transform: scale(1.2); 
            color: var(--color-accent); 
        }


        .logo {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-text-on-dark);
            margin-bottom: 2.5rem;
            text-align: center;
            opacity: 1;
            transition: opacity 0.3s ease, height 0.3s ease, margin 0.3s ease, font-size 0.3s ease;
            overflow: hidden;
            white-space: nowrap;
        }

        .sidebar.collapsed .logo {
            opacity: 0; height: 0; margin-bottom: 0; font-size: 0;
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            color: var(--color-text-on-dark);
            text-decoration: none;
            border-radius: var(--border-radius-sm);
            transition: all 0.2s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .sidebar.collapsed .nav-link {
            justify-content: center;
            padding: 0.8rem 0.25rem;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-link.active {
            background: var(--color-accent);
            color: var(--color-text-on-dark) !important;
            font-weight: 500;
        }
        .nav-link.active .nav-icon {
            color: var(--color-text-on-dark);
        }

        .nav-icon {
            margin-right: 0.8rem;
            font-size: 1.2rem;
            transition: opacity 0.3s ease, margin-right 0.3s ease, font-size 0.3s ease;
            flex-shrink: 0;
            width: 24px;
            text-align: center;
        }

        .sidebar.collapsed .nav-icon {
            margin-right: 0;
            font-size: 1.3rem;
        }

        .nav-text {
            transition: opacity 0.3s ease 0.1s, width 0.3s ease 0.1s;
            white-space: nowrap;
            overflow: hidden;
            font-size: 0.95rem;
        }

        .sidebar.collapsed .nav-text {
            opacity: 0; width: 0;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 2rem;
            transition: all 0.3s ease;
            overflow-y: auto;
        }

        .page-section { /* Used for anchor scrolling */
            padding-top: 1px; /* Prevents content from hiding under fixed headers if any */
            margin-top: -1px;
        }


        .page-container {
            background: var(--color-bg-card);
            padding: 2rem;
            border-radius: var(--border-radius-md);
            box-shadow: 0 5px 25px var(--color-shadow);
            margin-top: 1.5rem;
        }
        #home-page .page-container {
            background: none;
            padding: 0;
            box-shadow: none;
            margin-top: 0;
        }

        .header {
            background: var(--color-bg-header-page);
            padding: 2rem 2.5rem;
            border-radius: var(--border-radius-md);
            margin-bottom: 1.5rem;
            box-shadow: 0 5px 25px var(--color-shadow);
        }

        .header h1 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            color: var(--color-text-heading);
            margin-bottom: 0.5rem;
            text-align: left;
            font-weight: 600;
        }

        .header p {
            text-align: left;
            font-size: 1.05rem;
            color: var(--color-text-secondary);
        }

        /* Controls Panel */
        .controls {
            background: var(--color-bg-controls);
            padding: 1.5rem;
            border-radius: var(--border-radius-md);
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid var(--color-border);
        }

        .sort-controls, .filter-controls, .search-keyword-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sort-controls label, .filter-controls label, .search-keyword-controls label {
            font-weight: 500;
            color: var(--color-text-primary);
            font-size: 0.9rem;
        }

        select, input[type="text"], button {
            padding: 0.6rem 1rem;
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius-sm);
            background: var(--color-bg-card);
            color: var(--color-text-primary);
            font-family: var(--font-body);
            transition: all 0.2s ease-in-out;
            font-size: 0.9rem;
        }
        input[type="text"] {
            min-width: 180px;
        }

        select:focus, input[type="text"]:focus, button:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        button {
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            border-color: var(--color-accent-hover);
            color: var(--color-accent-hover);
        }

        button.active {
            background: var(--color-accent);
            color: var(--color-text-on-dark);
            border-color: var(--color-accent);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .hashtag-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem; 
            width: 100%; 
        }

        .hashtag-btn {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 15px;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
        }
        .hashtag-btn:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }
        .hashtag-btn.active {
            background: var(--color-accent);
            color: var(--color-text-on-dark);
            border-color: var(--color-accent);
        }

        /* Articles Grid */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .article-card {
            background: var(--color-bg-card);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            box-shadow: 0 5px 20px var(--color-shadow);
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(44, 62, 80, 0.2);
        }

        .article-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
            border-bottom: 1px solid var(--color-border);
        }

        .article-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .article-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--color-text-heading);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }
        .article-title:hover {
            color: var(--color-accent);
        }

        .article-date {
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .article-preview {
            color: var(--color-text-primary);
            opacity: 0.9;
            margin-bottom: 1rem;
            line-height: 1.6;
            font-size: 0.95rem;
            flex-grow: 1;
        }

        .article-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            background: var(--color-tag-bg);
            color: var(--color-tag-text);
            padding: 0.25rem 0.6rem;
            border-radius: var(--border-radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid transparent;
        }
        .tag:hover {
            border-color: var(--color-accent);
        }

        /* Pagination Controls */
        .pagination-controls-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem 0;
            gap: 0.5rem;
        }
        .pagination-controls-container button {
            padding: 0.5rem 1rem;
        }
        .pagination-controls-container span {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            margin: 0 0.5rem;
        }


        /* Markdown Content Styles */
        .markdown-content {
            line-height: 1.6;
            color: var(--color-text-primary);
            font-size: 1.2rem;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3, 
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            font-family: var(--font-heading);
            color: var(--color-text-heading);
            margin: 1.5rem 0 0.5rem 0; /* Adjusted for tighter layout */
            font-weight: 600;
            line-height: 1.3;
        }
        .markdown-content h1:has(+ .code-block-container),
        .markdown-content h2:has(+ .code-block-container),
        .markdown-content h3:has(+ .code-block-container),
        .markdown-content h4:has(+ .code-block-container),
        .markdown-content h5:has(+ .code-block-container),
        .markdown-content h6:has(+ .code-block-container) {
            margin-bottom: 0.3rem; 
        }


        .markdown-content h1 { font-size: 2em; border-bottom: 2px solid var(--color-border); padding-bottom: 0.5rem; }
        .markdown-content h2 { font-size: 1.7em; border-bottom: 1px solid var(--color-border); padding-bottom: 0.4rem; }
        .markdown-content h3 { font-size: 1.4em; }
        .markdown-content h4 { font-size: 1.2em; color: var(--color-text-secondary); }
        .markdown-content h5 { font-size: 1.1em; color: var(--color-text-secondary); }
        .markdown-content h6 { font-size: 1em; color: var(--color-text-secondary); text-transform: uppercase; }

        .markdown-content p {
            margin: 0 0 0.8rem 0; /* Adjusted for tighter layout */
        }

        .markdown-content ul, .markdown-content ol {
            margin: 0 0 0.8rem 1.5rem; /* Adjusted for tighter layout */
            padding-left: 1.5rem;
        }
        .markdown-content ul { list-style-type: disc; }
        .markdown-content ol { list-style-type: decimal; }

        .markdown-content li {
            margin: 0.5rem 0;
        }
        .markdown-content li p { margin-bottom: 0.3rem; }
        .markdown-content li:has(+ .code-block-container) {
            margin-bottom: 0;
        }
        .markdown-content li > p:has(+ .code-block-container) {
             margin-bottom: 0.2rem; 
        }
        .markdown-content li > p:last-child:has(+ .code-block-container) {
             margin-bottom: 0.2rem;
        }


        .markdown-content a {
            color: var(--color-accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .markdown-content a:hover {
            color: var(--color-accent-hover);
            border-bottom-color: var(--color-accent-hover);
        }

        .markdown-content code:not(pre > code) {
            background: rgba(224, 230, 237, 0.7);
            padding: 0.2em 0.4em;
            border-radius: var(--border-radius-sm);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            font-size: 0.9em;
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }
        
        /* Code Block Container and Copy Button */
        .code-block-container {
            position: relative; 
            margin-top: 0.5rem;  
            margin-bottom: 0.8rem; 
        }

        .code-block-container pre {
            margin: 0; 
            background: #2d2d2d; 
            border-radius: var(--border-radius-sm);
            padding: 1rem; 
            overflow-x: auto;
            box-shadow: 0 4px 10px var(--color-shadow);
            border: 1px solid #444;
        }
        .code-block-container pre code { 
            background: none !important;
            padding: 0 !important;
            color: #ccc !important; 
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace !important;
            font-size: 0.9em !important;
            border: none !important;
        }

        .copy-code-button {
            position: absolute;
            top: 0.3em;  
            right: 0.5em; 
            padding: 0.3em 0.6em;
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--color-text-on-dark); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            font-size: 0.8em;
            opacity: 0.3; 
            transition: opacity 0.2s ease-in-out, background-color 0.2s ease-in-out;
            z-index: 1; 
        }

        .code-block-container:hover .copy-code-button,
        .copy-code-button:focus, 
        .copy-code-button:hover {
            opacity: 1;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .copy-code-button.copied {
            background-color: var(--color-accent) !important; 
            color: var(--color-text-on-dark) !important;
            border-color: var(--color-accent) !important;
            opacity: 1 !important;
        }


        .markdown-content blockquote {
            border-left: 4px solid var(--color-accent);
            padding: 0.5rem 1.5rem;
            margin: 1rem 0; /* Adjusted margin */
            background: rgba(52, 152, 219, 0.05);
            color: var(--color-text-secondary);
            border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;
        }
        .markdown-content blockquote p {
            margin-bottom: 0.5rem;
        }
        .markdown-content blockquote p:last-child {
            margin-bottom: 0;
        }

        .markdown-content hr {
            border: none;
            height: 1px;
            background: var(--color-border);
            margin: 2rem 0; /* Adjusted margin */
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius-sm);
            margin: 1rem 0; /* Adjusted margin */
            box-shadow: 0 4px 15px var(--color-shadow);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0; /* Adjusted margin */
            background: var(--color-bg-card);
            border-radius: var(--border-radius-sm);
            overflow: hidden;
            border: 1px solid var(--color-border);
            box-shadow: 0 2px 8px var(--color-shadow);
        }

        .markdown-content th, .markdown-content td {
            padding: 0.8rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
        }
        .markdown-content tr:last-child td {
            border-bottom: none;
        }

        .markdown-content th {
            background: var(--color-bg-body);
            font-weight: 600;
            color: var(--color-text-heading);
        }

        /* Mermaid Diagram Styles */
        .mermaid {
            background: var(--color-bg-card);
            border-radius: var(--border-radius-sm);
            padding: 1.5rem;
            margin: 1rem 0; /* Adjusted margin */
            text-align: center;
            box-shadow: 0 4px 10px var(--color-shadow);
            border: 1px solid var(--color-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mermaid svg { max-width: 100%; }

        /* Responsive Design */
        @media (max-width: 992px) {
            .sidebar { width: 220px; }
            .sidebar.collapsed { width: 60px; }
            .main-content { padding: 1.5rem; }
            .header { padding: 1.5rem; }
            .header h1 { font-size: 1.8rem; }
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar {
                width: 100%; height: auto; padding: 0.75rem 1rem;
                border-right: none;
                border-bottom: 1px solid var(--color-bg-sidebar);
                box-shadow: 0 3px 10px var(--color-shadow);
            }
            .sidebar.collapsed {
                width: 100%; height: 50px;
                padding: 0 1rem;
                overflow: hidden;
            }
            .sidebar-toggle { 
                background: transparent; 
                color: var(--color-text-on-dark); 
                border: none;
                top: 50%; 
                transform: translateY(-50%) translateX(5px); 
                right: 1rem; 
            }
            .sidebar.collapsed .logo { display: none; }
            .sidebar .logo { margin-bottom: 1rem; font-size: 1.4rem; }

            .sidebar .nav-menu {
                display: flex; flex-direction: row;
                overflow-x: auto;
                padding-bottom: 0.5rem;
            }
             .sidebar .nav-item { margin-bottom: 0; margin-right: 0.5rem;}
             .sidebar .nav-link { padding: 0.5rem 0.8rem; }
             .sidebar .nav-icon { margin-right: 0.4rem; font-size: 1rem; }
             .sidebar .nav-text { font-size: 0.85rem; }

            .sidebar.collapsed .nav-menu {
                display: flex; flex-direction: row;
                justify-content: space-around; align-items: center;
                height: 100%;
            }
            .sidebar.collapsed .nav-item { margin-bottom: 0; margin-right: 0; }
            .sidebar.collapsed .nav-link { padding: 0.5rem; }
            .sidebar.collapsed .nav-icon { font-size: 1.2rem; }

            .articles-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .main-content { padding: 1rem; }
            .header { padding: 1rem 1.5rem; margin-bottom: 1rem; }
            .header h1 { font-size: 1.6rem; }
            .page-container { padding: 1.5rem; margin-top: 1rem;}
            .controls { padding: 1rem; gap: 1rem; }
            .search-keyword-controls { flex-direction: column; align-items: stretch; } 
            .search-keyword-controls input[type="text"] { width: 100%; }
            .search-keyword-controls button { width: 100%; margin-top: 0.5rem; }
            .search-keyword-controls label { margin-bottom: 0.25rem; }


            .markdown-content { font-size: 1.2rem; }
            .markdown-content h1 {font-size: 1.8em;}
            .markdown-content h2 {font-size: 1.5em;}
            .markdown-content h3 {font-size: 1.25em;}
        }

        /* Loading Animation (specific for old browsers, a simple text if needed) */
        .loading {
            text-align: center; padding: 3rem;
            color: var(--color-text-secondary); font-size: 1.1rem;
        }
        /* .loading::after { content: '...'; animation: dots 1.5s infinite; } */
        /* @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } } */

        /* Category and Archive Page Specific Styles */
        .categories-list, .archive-list { list-style: none; padding: 0; }

        .categories-list li { margin-bottom: 0.75rem; }
        .categories-list .category-link {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background-color: var(--color-bg-body);
            color: var(--color-text-primary);

        // --- Dynamic Fish Animation ---
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingAnimationElement = document.getElementById('loadingAnimation');
        let loadingInterval;
        const animationRows = 16; 
        const animationCols = 7;
        let dynamicFishFrames = [];
        let currentFrameIndex_anim = 0; 
        let animationStage_anim = 0; 
        // --- END Dynamic Fish Animation ---

        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'neutral',
            themeVariables: { 
                primaryColor: getComputedStyle(document.documentElement).getPropertyValue('--color-bg-card').trim() || '#ffffff',
                primaryTextColor: getComputedStyle(document.documentElement).getPropertyValue('--color-text-primary').trim() || '#34495e',
                primaryBorderColor: getComputedStyle(document.documentElement).getPropertyValue('--color-border').trim() || '#e0e6ed',
                lineColor: getComputedStyle(document.documentElement).getPropertyValue('--color-accent').trim() || '#3498db',
            }
        });

        function generateFishFrames(rows, cols) {
            const frames = [];
            let currentGrid = [];
            for (let r = 0; r < rows; r++) {
                currentGrid[r] = [];
                for (let c = 0; c < cols; c++) {
                    currentGrid[r][c] = ' ';
                }
            }
            const maxDiagonalSum = rows + cols - 2;
            for (let diagSum = 0; diagSum <= maxDiagonalSum; diagSum++) {
                let frameGrid = currentGrid.map(arr => arr.slice()); 
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (r + c <= diagSum) {
                            if (frameGrid[r][c] === ' ') { 
                                frameGrid[r][c] = '🐟';
                            }
                        }
                    }
                }
                frames.push(gridToString(frameGrid, rows, cols));
                currentGrid = frameGrid; 
            }
            const finalFullGrid = [];
            for (let r = 0; r < rows; r++) {
                finalFullGrid[r] = [];
                for (let c = 0; c < cols; c++) {
                    finalFullGrid[r][c] = '🐟';
                }
            }
            const lastFrameString = gridToString(finalFullGrid, rows, cols);
            if (frames.length === 0 || frames[frames.length - 1] !== lastFrameString) {
                 frames.push(lastFrameString);
            }
            const uniqueFrames = [];
            const seenFrames = new Set();
            for (const frame of frames) {
                if (!seenFrames.has(frame)) {
                    uniqueFrames.push(frame);
                    seenFrames.add(frame);
                }
            }
            return uniqueFrames;
        }

        function gridToString(grid, totalRows, totalCols) {
            let frameStr = "";
            for (let r = 0; r < totalRows; r++) {
                if (grid[r]) { 
                    let rowStr = "";
                    for (let c = 0; c < totalCols; c++) {
                        rowStr += (grid[r][c] || ''); 
                    }
                    frameStr += rowStr + (r < totalRows - 1 ? "\n" : "");
                } else { 
                    frameStr += ' '.repeat(totalCols) + (r < totalRows - 1 ? "\n" : "");
                }
            }
            return frameStr;
        }

        function startLoadingAnimation() {
            if (!loadingAnimationElement || !loadingOverlay) return;
            dynamicFishFrames = generateFishFrames(animationRows, animationCols);
            if (dynamicFishFrames.length === 0) { 
                loadingAnimationElement.textContent = "🐟🐟🐟"; 
                return;
            }
            loadingOverlay.classList.remove('hidden'); 
            currentFrameIndex_anim = 0;
            animationStage_anim = 0; 

            loadingInterval = setInterval(() => {
                if (loadingAnimationElement) {
                    loadingAnimationElement.textContent = dynamicFishFrames[currentFrameIndex_anim];
                }
                if (animationStage_anim === 0) { 
                    currentFrameIndex_anim++;
                    if (currentFrameIndex_anim >= dynamicFishFrames.length) {
                        currentFrameIndex_anim = dynamicFishFrames.length - 1; 
                        animationStage_anim = 1; 
                    }
                } else if (animationStage_anim === 1) { 
                    // Holding last frame.
                    currentFrameIndex_anim = 0;
                    animationStage_anim = 0; 
                }
            }, 80); 
        }

        function stopLoadingAnimation() {
            clearInterval(loadingInterval);
            if (loadingOverlay) {
                loadingOverlay.classList.add('hidden');
            }
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');

        }
        
        function updateURL(params = {}, replace = false) {
            const currentParams = new URLSearchParams(); 
            currentParams.set('page', activePageId);
            if (activePageId === 'home') {
                if (params.sort !== undefined) currentParams.set('sort', params.sort);
                else currentParams.set('sort', currentSortBy); 
                if (params.tags !== undefined && params.tags.length > 0) {
                    currentParams.set('tags', params.tags.join(','));
                } else if (currentHashtags.length > 0) {
                    currentParams.set('tags', currentHashtags.map(t => encodeURIComponent(t)).join(','));
                }
                if (params.keywords !== undefined && params.keywords.length > 0) {
                    currentParams.set('keywords', params.keywords.join('+'));
                } else if (currentKeywordsArray.length > 0) {
                    currentParams.set('keywords', currentKeywordsArray.map(k => encodeURIComponent(k)).join('+'));
                }
                if (params.p !== undefined && params.p > 1) currentParams.set('p', params.p);
                else if (currentPage > 1) currentParams.set('p', currentPage);
            } else if (activePageId === 'article-detail') {
                if (params.articleId !== undefined) {
                    currentParams.set('article', params.articleId);
                }
            }
            const newSearch = currentParams.toString();
            const newHash = activePageId === 'article-detail' && params.articleId ? `#article-${params.articleId}` : `#${activePageId}`;
            const newURL = `${window.location.pathname}${newSearch ? '?' + newSearch : ''}${newHash}`;
            const state = { page: activePageId, articleId: activePageId === 'article-detail' ? params.articleId : null };
            if (replace) {
                history.replaceState(state, '', newURL);
            } else {
                history.pushState(state, '', newURL);
            }
        }

        function navigateToPage(pageId, articleToOpen = null, options = {}) {
            activePageId = pageId; 
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const activeNavLink = document.querySelector(`.nav-link[data-page="${pageId === 'article-detail' ? 'home' : pageId}"]`);

                if (articleDetailPageElement) {

                 if (articleDetailPageElement) { 
                    articleDetailPageElement.style.display = 'none';

                    targetPageElement.style.display = 'block';

                    document.getElementById('home-page').style.display = 'block';
                    activePageId = 'home';

            }
            if (!options.fromURL) { 
                 updateURL({ 
                    articleId: pageId === 'article-detail' && articleToOpen ? articleToOpen.id : undefined,
                    p: (pageId === 'home' && options.preservePage) ? currentPage : undefined
                });
            }
            if (pageId === 'home') {

        document.querySelectorAll('.nav-link').forEach(link => {

        function loadStateFromURL() {
            const params = new URLSearchParams(window.location.search);
            let hash = window.location.hash.substring(1); 
            let pageIdFromParam = params.get('page');
            let articleIdFromParam = params.get('article');
            if (pageIdFromParam === 'article-detail' && articleIdFromParam) {
                activePageId = 'article-detail';

                 if (hash.startsWith('article-') && articles.length > 0) {

            } else {
                 activePageId = 'home'; 
            }
            currentSortBy = params.get('sort') || 'newest';
            if (sortSelectElement) sortSelectElement.value = currentSortBy;
            const tagsFromURL = params.get('tags');
            currentHashtags = tagsFromURL ? tagsFromURL.split(',').map(t => decodeURIComponent(t)) : [];
            const hashtagFiltersElement = document.getElementById('hashtagFilters');

            if (keywordSearchInput) keywordSearchInput.value = currentKeywordsArray.join(' ');
            currentPage = parseInt(params.get('p')) || 1;
            if (activePageId === 'article-detail' && articleIdFromParam && articles.length > 0) {
                const articleToOpen = articles.find(art => art.id === articleIdFromParam);
                if (articleToOpen) {
                    openArticle(articleToOpen, null, true); 
                } else {
                    console.warn(`Article with ID "${articleIdFromParam}" not found from URL. Defaulting to home.`);
                    navigateToPage('home', null, { fromURL: true, preservePage: true });

            } else {

        }

         function markdownToHtml(markdown) {
            if (typeof markdown !== 'string' || !markdown) return '';
            let html = markdown;
            
            // Mermaid diagrams
            html = html.replace(/^```mermaid\n([\s\S]*?)\n```$/gm, (match, diagram) => {
                const id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
                return `<div class="mermaid" id="${id}">${escapeHtml(diagram.trim())}</div>`;
            });

            // Code blocks: Wrap with a container and add copy button
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/gs, (match, lang, code) => {
                const language = lang || 'plaintext';
                const escapedCode = escapeHtml(code.trim());
                const preId = 'code-block-' + Math.random().toString(36).substr(2, 9); 
                // MODIFIED LINE: Return HTML as a single line string
                return `<div class="code-block-container"><button class="copy-code-button" data-clipboard-target="#${preId}" title="複製程式碼">📄</button><pre id="${preId}" tabindex="0"><code class="language-${language}">${escapedCode}</code></pre></div>`;
            });

            // Headings
            html = html.replace(/^###### (.*$)/gm, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');

            // Horizontal Rule
            html = html.replace(/^(\*\*\*|---|\*\s\*\s\*)$/gm, '<hr>');

            // Lists (simplified, works for basic cases)
            // Unordered lists
            html = html.replace(/^[\s]*([*+-]) +([^\n]+(?:(?!\n[\s]*[*+-] ).*\n?)*)/gm, (m,b,i) => `<li>${i.trim().replace(/\n(?!\s*([*+-]|\d+\.))/g, '<br>')}</li>`);
            html = html.replace(/(<li>.*?<\/li>\s*)+/gm, (match) => {
                if(!match.trim().startsWith("<li>")) return match; 
                // Avoid re-wrapping if already inside a list (basic check)
                if (match.includes("<ul>") || match.includes("<ol>")) return match;
                return `<ul>\n${match.trim()}\n</ul>`;
            });
            // Ordered lists
            html = html.replace(/^[\s]*(\d+)\. +([^\n]+(?:(?!\n[\s]*\d+\.).*\n?)*)/gm, (m,n,i) => `<li>${i.trim().replace(/\n(?!\s*([*+-]|\d+\.))/g, '<br>')}</li>`);
            html = html.replace(/(<li>.*?<\/li>\s*)+/gm, (match) => { 
                 if(!match.trim().startsWith("<li>")) return match;
                 if (match.includes("<ul>") || match.includes("<ol>")) return match;
                 // A more robust check for list type might be needed if mixing list markers in unexpected ways
                 const firstLiContent = match.substring(match.indexOf('<li>') + 4);
                 const listType = /^\s*\d/.test(firstLiContent) ? 'ol' : 'ul'; 
                 return `<${listType}>\n${match.trim()}\n</${listType}>`;
            });

            // Blockquotes
            html = html.replace(/^> +(.*)/gm, (match, content) => `<blockquote><p>${content.trim()}</p></blockquote>`);
            html = html.replace(/<\/blockquote>\s*<blockquote>/g, ''); // Merge adjacent blockquotes

            // Paragraphs (handle after block elements)
            html = html.split(/\n\s*\n/).map(paragraph => {
                const trimmed = paragraph.trim();
                if (!trimmed) return '';
                // Check if it's already a block-level HTML element generated by previous rules
                if (/^<\/?(h[1-6]|ul|ol|li|hr|blockquote|pre|div class="code-block-container"|div class="mermaid")/.test(trimmed)) {
                    return paragraph; 
                }
                return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
            }).join('');

            // Images and Links
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Bold, Italic, Inline Code
            html = html.replace(/\*\*([^\s*](?:[^*]*[^\s*])?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^\s*](?:[^*]*[^\s*])?)\*/g, '<em>$1</em>'); // or _{1}_ for italics
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Cleanup empty paragraphs or paragraphs wrapping block elements (order might matter)
            html = html.replace(/<p>\s*<\/(ul|ol|h[1-6]|hr|blockquote|pre|div)>/gi, '</$1>');
            html = html.replace(/<(ul|ol|h[1-6]|hr|blockquote|pre|div)>\s*<\/p>/gi, '<$1>');
            html = html.replace(/<p>\s*<\/p>/g, ''); // Remove genuinely empty paragraphs

            return html;
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadData() {
            startLoadingAnimation();
            try {
                const gasUrl = 'https://script.google.com/macros/s/AKfycbxrM67dWveK91ty2SWHY_Fz55Vtyf76hVc1lywYMRrHKLY1lz-DdYdm8ivu6dRDb_jE/exec';
                // await new Promise(resolve => setTimeout(resolve, 2000)); // For testing animation
                const response = await fetch(gasUrl);
                if (!response.ok) throw new Error(`HTTP 錯誤！狀態: ${response.status}`);
                const fetchedData = await response.json();
                if (fetchedData.error) throw new Error(`GAS 錯誤: ${fetchedData.error} - ${fetchedData.message || ''}`);
                allData = fetchedData;
                articles = (allData.articles || []).map(row => {
                    const title = row[0] || "無標題";
                    const content = row[1] || "";
                    const date = row[2] ? new Date(row[2]) : null;
                    const image = row[3] || "https://images.unsplash.com/photo-1518770660439-4636190af475?w=400&h=200&fit=crop";
                    const hashtags = row[4] && typeof row[4] === 'string' ? row[4].split(',').map(tag => tag.trim()).filter(tag => tag) : [];
                    let articleHtmlId = 'article-invalid-id';
                    if (title !== "無標題" && date && date instanceof Date && !isNaN(date)) {
                        const displayDateForId = date.toLocaleDateString('zh-TW'); 
                        articleHtmlId = CSS.escape(`${title} ${displayDateForId}`);
                    }
                    return { id: articleHtmlId, title, content, date, image, hashtags };
                }).filter(article => article.title !== "無標題" && article.date);
                pagesContent = allData.pages || {};
                generateHashtagFilters(); 
                if(pagesContent.about) renderStaticPage('about');
                if(pagesContent.contact) renderStaticPage('contact');
                renderCategoriesPage(); 
                renderArchivePage();    
                loadStateFromURL(); 
                stopLoadingAnimation();
            } catch (error) {
                console.error('載入資料失敗:', error);
                if(articlesGridElement) articlesGridElement.innerHTML = `<div class="loading">載入資料失敗: ${error.message}<br>請檢查 Google Sheets 設定和 GAS URL。</div>`;
                renderPaginationControls();
                stopLoadingAnimation();
            }
        }
        
        function initializeCopyCodeButtons(parentElement = document) {
            const copyButtons = parentElement.querySelectorAll('.copy-code-button');
            copyButtons.forEach(button => {
                button.removeEventListener('click', handleCopyCodeClick); 
                button.addEventListener('click', handleCopyCodeClick);
            });
        }

        function handleCopyCodeClick(event) {
            const button = event.currentTarget;
            const targetId = button.dataset.clipboardTarget; 
            if (!targetId) return;
            const preElement = document.querySelector(targetId);
            if (!preElement) return;
            const codeElement = preElement.querySelector('code');
            if (!codeElement) return;
            const codeToCopy = codeElement.textContent;
            navigator.clipboard.writeText(codeToCopy).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = '✅ 已複製!'; 
                button.classList.add('copied');
                setTimeout(() => {
                    button.innerHTML = originalText; 
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('無法複製程式碼: ', err);
                const originalText = button.innerHTML;
                button.innerHTML = '❌ 失敗';
                setTimeout(() => {
                    button.innerHTML = originalText;
                }, 2000);
            });
        }

        function renderStaticPage(pageName) {
            const pageData = pagesContent[pageName];
            const titleElement = document.getElementById(`${pageName}-title`);
            const contentElement = document.getElementById(`${pageName}-content`);
            if (!contentElement) return;
            if (pageData && pageData.content) {
                if (titleElement && pageData.title) titleElement.textContent = pageData.title;
                contentElement.innerHTML = markdownToHtml(pageData.content);
                setTimeout(() => {
                    if (typeof mermaid !== 'undefined' && typeof mermaid.run === 'function') {  mermaid.run({ nodes: contentElement.querySelectorAll('.mermaid') }); }
                    if (typeof Prism !== 'undefined') Prism.highlightAllUnder(contentElement);
                    initializeCopyCodeButtons(contentElement); 
                }, 100);
            } else {
                if (titleElement) titleElement.textContent = pageName.charAt(0).toUpperCase() + pageName.slice(1);
                contentElement.innerHTML = `<p>此頁面 (${pageName}) 內容尚未設定。</p>`;
            }
        }

        function renderCategoriesPage() {
            const contentElement = document.getElementById('categories-content');
            if (!contentElement) return;
            const allUniqueHashtags = new Set();
            articles.forEach(article => (article.hashtags || []).forEach(tag => allUniqueHashtags.add(tag)));
            if (allUniqueHashtags.size === 0) {
                contentElement.innerHTML = '<p>目前沒有分類標籤。</p>'; return;
            }
            let html = '<ul class="categories-list">';
            allUniqueHashtags.forEach(tag => {
                html += `<li><a href="#" class="category-link" data-hashtag="${escapeHtml(tag)}">#${escapeHtml(tag)}</a></li>`;
            });
            html += '</ul>';
            contentElement.innerHTML = html;
            contentElement.querySelectorAll('.category-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const hashtag = e.target.dataset.hashtag;
                    currentHashtags = [hashtag]; 
                    currentPage = 1;
                    navigateToPage('home', null, { fromURL: false, preservePage: false }); 
                });
            });
        }
        
        function renderArchivePage() {
            const contentElement = document.getElementById('archive-content');
            if (!contentElement || articles.length === 0) {
                if(contentElement) contentElement.innerHTML = '<p>目前沒有文章可供歸檔。</p>';
                return;
            }
            const articlesByYearMonth = {};
            articles.sort((a, b) => b.date.getTime() - a.date.getTime()) 
                   .forEach(article => {
                const year = article.date.getFullYear();
                const month = article.date.getMonth(); 
                if (!articlesByYearMonth[year]) articlesByYearMonth[year] = {};
                if (!articlesByYearMonth[year][month]) articlesByYearMonth[year][month] = [];
                articlesByYearMonth[year][month].push(article);
            });
            let html = '<ul class="archive-list">';
            const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
            Object.keys(articlesByYearMonth).sort((a, b) => b - a).forEach(year => { 
                html += `<li class="archive-year">${year}</li>`;
                Object.keys(articlesByYearMonth[year]).sort((a, b) => b - a).forEach(monthIndex => { 
                    html += `<li class="archive-month">${monthNames[parseInt(monthIndex)]}</li>`;
                    articlesByYearMonth[year][monthIndex].forEach(article => {
                        const articleDateStr = article.date.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });
                        html += `<li><span class="archive-date">${articleDateStr}</span> <a href="#" class="archive-link" data-article-id="${article.id}">${escapeHtml(article.title)}</a></li>`;
                    });
                });
            });
            html += '</ul>';
            contentElement.innerHTML = html;
            contentElement.querySelectorAll('.archive-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const articleId = e.target.dataset.articleId;
                    const articleToOpen = articles.find(art => art.id === articleId);
                    if(articleToOpen) {
                        openArticle(articleToOpen);
                    }
                });
            });
        }

        function generateHashtagFilters() {
            const allUniqueHashtags = new Set();
            articles.forEach(article => (article.hashtags || []).forEach(tag => allUniqueHashtags.add(tag)));
            const filtersContainer = document.getElementById('hashtagFilters');
            if (!filtersContainer) return;
            filtersContainer.innerHTML = ''; 
            allUniqueHashtags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'hashtag-btn';
                btn.textContent = `#${tag}`;
                btn.dataset.hashtag = tag; 
                btn.onclick = () => filterByHashtag(tag);
                filtersContainer.appendChild(btn);
            });
        }

        function filterByHashtag(hashtag) { 
            const index = currentHashtags.indexOf(hashtag);
            if (index > -1) {
                currentHashtags.splice(index, 1); 
            } else {
                currentHashtags.push(hashtag); 
            }
            document.querySelectorAll('.hashtag-btn').forEach(btn => {
                 btn.classList.toggle('active', currentHashtags.includes(btn.dataset.hashtag));
            });
            currentPage = 1; 
            sortAndDisplayArticles({ preservePage: false }); 
            updateURL({ tags: currentHashtags.map(t => encodeURIComponent(t)), p: currentPage });
        }

        function clearAllHashtagFilters() { 
            currentHashtags = [];
            document.querySelectorAll('.hashtag-btn').forEach(btn => btn.classList.remove('active'));
            currentPage = 1;
            sortAndDisplayArticles({ preservePage: false }); 
            updateURL({ tags: [], p: currentPage });
        }
        if (clearFiltersButton) {
            clearFiltersButton.onclick = clearAllHashtagFilters;
        }
        
        function performKeywordSearch() {
            currentKeywordsArray = keywordSearchInput.value.trim().toLowerCase().split(/\s+/).filter(k => k); 
            currentPage = 1;
            if (activePageId === 'home') {
                sortAndDisplayArticles({ preservePage: false });
            }
            updateURL({ keywords: currentKeywordsArray.map(k => encodeURIComponent(k)), p: currentPage });
        }

        function clearKeywordSearch() {
            if (keywordSearchInput) keywordSearchInput.value = '';
            currentKeywordsArray = [];
            currentPage = 1;
            if (activePageId === 'home') {
                sortAndDisplayArticles({ preservePage: false });
            }
            updateURL({ keywords: [], p: currentPage });
        }

        function applyFiltersAndSearch() {
            let tempArticles = [...articles];
            if (currentHashtags.length > 0) {
                tempArticles = tempArticles.filter(article => 
                    currentHashtags.every(ht => (article.hashtags || []).includes(ht))
                );
            }
            if (currentKeywordsArray.length > 0) {
                tempArticles = tempArticles.filter(article => {
                    return currentKeywordsArray.every(keyword => {
                        const titleMatch = article.title.toLowerCase().includes(keyword);
                        const contentMatch = article.content.toLowerCase().includes(keyword);
                        return titleMatch || contentMatch;
                    });
                });
            }
            filteredArticles = tempArticles;
        }

        function sortAndDisplayArticles(options = {}) { 
            applyFiltersAndSearch(); 
            filteredArticles.sort((a, b) => {
                if (!a.date || !b.date) return 0;
                return currentSortBy === 'newest' ? b.date.getTime() - a.date.getTime() : a.date.getTime() - b.date.getTime();
            });
            displayArticles(); 
            if (options.scrollToId && activePageId === 'home') { 
                 setTimeout(() => {
                    const targetArticleElement = document.getElementById(options.scrollToId);
                    if (targetArticleElement) {
                        targetArticleElement.scrollIntoView({ behavior: 'auto', block: 'nearest' });
                    }
                }, 120); 
            }
        }

        function displayArticles() {
            if (!articlesGridElement) return;
            articlesGridElement.innerHTML = ''; 
            const startIndex = (currentPage - 1) * articlesPerPage;
            const endIndex = startIndex + articlesPerPage;
            const paginatedArticles = filteredArticles.slice(startIndex, endIndex);
            if (paginatedArticles.length === 0 && filteredArticles.length === 0) { 
                 articlesGridElement.innerHTML = '<div class="loading">沒有找到相關文章。</div>';
            } else if (paginatedArticles.length === 0 && filteredArticles.length > 0) { 
                 articlesGridElement.innerHTML = '<div class="loading">此頁沒有文章。</div>';
            }
            paginatedArticles.forEach(article => {
                const plainTextContent = (article.content || "").replace(/[#*`>\-\[\]()!]/g, '').replace(/\n/g, ' ').trim();
                const preview = plainTextContent.length > 100 ? plainTextContent.substring(0, 100) + '...' : plainTextContent;
                const displayDate = article.date instanceof Date && !isNaN(article.date)
                                    ? article.date.toLocaleDateString('zh-TW') : '日期未知';
                const articleCard = document.createElement('article');
                articleCard.className = 'article-card';
                articleCard.id = article.id; 
                articleCard.innerHTML = `
                    <img itemprop="image" src="${article.image || 'https://via.placeholder.com/400x200.png?text=No+Image'}" alt="${escapeHtml(article.title)}" class="article-image">
                    <div class="article-content">
                        <h3 class="article-title" itemprop="headline">${escapeHtml(article.title)}</h3>
                        <div class="article-date">
                            <time itemprop="datePublished" datetime="${article.date.toISOString()}">${displayDate}</time>
                        </div>
                        <p class="article-preview" itemprop="description">${escapeHtml(preview)}</p>
                        <div class="article-tags">
                            ${(article.hashtags || []).map(tag => `<span class="tag" itemprop="keywords">#${escapeHtml(tag)}</span>`).join('')}
                        </div>
                    </div>`;
                articleCard.addEventListener('click', () => openArticle(article, articleCard)); 
                articlesGridElement.appendChild(articleCard);
            });
            renderPaginationControls();
        }

        function renderPaginationControls() {
            if (!paginationContainerElement) return;
            paginationContainerElement.innerHTML = '';
            const totalPages = Math.ceil(filteredArticles.length / articlesPerPage);
            if (totalPages <= 1) return; 
            const prevButton = document.createElement('button');
            prevButton.textContent = '上一頁';
            prevButton.disabled = currentPage === 1;
            prevButton.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    displayArticles(); 
                    window.scrollTo(0, articlesGridElement.offsetTop - 20); 
                    updateURL({ p: currentPage });
                }
            });
            paginationContainerElement.appendChild(prevButton);
            const pageInfo = document.createElement('span');
            pageInfo.textContent = ` 第 ${currentPage} / ${totalPages} 頁 `;
            paginationContainerElement.appendChild(pageInfo);
            const nextButton = document.createElement('button');
            nextButton.textContent = '下一頁';
            nextButton.disabled = currentPage === totalPages;
            nextButton.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    displayArticles(); 
                    window.scrollTo(0, articlesGridElement.offsetTop - 20); 
                    updateURL({ p: currentPage });
                }
            });
            paginationContainerElement.appendChild(nextButton);
        }
        
        function openArticle(article, articleCardElement = null, fromURL = false) {
            if (!article) {
                console.error("Attempted to open a null article.");
                navigateToPage('home', null, { fromURL: true, preservePage: false }); 
                return;
            }
            if (!fromURL) { 
                sessionStorage.setItem('previousPageURL', window.location.href);
                sessionStorage.removeItem('clickedArticleId');
                sessionStorage.removeItem('clickedArticlePage');
                sessionStorage.removeItem('sourcePageIdForArticle');
            }
            navigateToPage('article-detail', article, { fromURL: fromURL, preservePage: false }); 
            const articlePageContainer = document.getElementById('article-detail-page');
            if (!articlePageContainer) return; 
            const renderedContent = markdownToHtml(article.content);
            const displayDate = article.date instanceof Date && !isNaN(article.date)
                                ? article.date.toLocaleDateString('zh-TW') : '日期未知';
            articlePageContainer.innerHTML = `
                <header class="header">
                    <button onclick="closeArticle()" style="float: right; background: transparent; border: none; font-size: 1.5rem; cursor: pointer; color: var(--color-text-primary); padding: 0.5rem 1rem; line-height: 1;">✕</button>
                    <h1>${escapeHtml(article.title)}</h1>
                    <p>發布於 ${displayDate}</p>
                    <div style="text-align: left; margin-top: 1rem;">
                        ${(article.hashtags || []).map(tag => `<span class="tag" style="margin: 0 0.2rem;">#${escapeHtml(tag)}</span>`).join('')}
                    </div>
                </header>
                <div class="page-container">
                    <div class="markdown-content">${renderedContent}</div>
                </div>`;
            window.scrollTo(0, 0); 
            setTimeout(() => {
                if (typeof mermaid !== 'undefined' && typeof mermaid.run === 'function') {
                     mermaid.run({ nodes: articlePageContainer.querySelectorAll('.mermaid') });
                }
                if (typeof Prism !== 'undefined') Prism.highlightAllUnder(articlePageContainer);
                initializeCopyCodeButtons(articlePageContainer);
            }, 100);
        }

        function closeArticle() {
            const previousPageURL = sessionStorage.getItem('previousPageURL');
            sessionStorage.removeItem('previousPageURL'); 
            if (previousPageURL) {
                try {
                    history.pushState(null, '', previousPageURL); 
                    loadStateFromURL(); 
                } catch (e) {
                    console.error("Error navigating to previousPageURL, defaulting to home:", e);
                    navigateToPage('home', null, { fromURL: false, preservePage: false });
                }
            } else {
                navigateToPage('home', null, { fromURL: false, preservePage: false });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.querySelector('.sidebar-toggle');
            if (sidebar && toggleBtn) {
                 toggleBtn.textContent = '🐟'; 
            }
            loadData(); 
            if (sortSelectElement) {
                sortSelectElement.addEventListener('change', () => {
                    currentSortBy = sortSelectElement.value;
                    currentPage = 1; 
                    sortAndDisplayArticles({preservePage: false}); 
                    updateURL({ sort: currentSortBy, p: currentPage }); 
                });
            }
            if (keywordSearchButton) {
                keywordSearchButton.addEventListener('click',() => {
                    currentPage = 1; 
                    performKeywordSearch(); 
                    if(activePageId === 'home') sortAndDisplayArticles({ preservePage: false });
                    // updateURL is called by performKeywordSearch implicitly if state is updated
                });
            }
            if (keywordClearButton) {
                keywordClearButton.addEventListener('click', () => {
                    currentPage = 1; 
                    clearKeywordSearch();
                    if(activePageId === 'home') sortAndDisplayArticles({ preservePage: false });
                    // updateURL is called by clearKeywordSearch implicitly
                });
            }
            if (keywordSearchInput) {
                keywordSearchInput.addEventListener('keyup', (event) => {
                    if (event.key === 'Enter') {
                        currentPage = 1; 
                        performKeywordSearch();
                        if(activePageId === 'home') sortAndDisplayArticles({ preservePage: false });
                        // updateURL is called by performKeywordSearch implicitly
                    }
                });
            }
            if (clearFiltersButton) { 
                clearFiltersButton.onclick = () => {
                    currentPage = 1; 
                    clearAllHashtagFilters(); 
                };
            }
        });
    </script>
</body>
</html>
